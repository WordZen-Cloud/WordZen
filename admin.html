<!DOCTYPE html>
<html>
<head>
    <title>WordZen | Admin</title>
    <style>
        body { background:#000; color:#fff; font-family:sans-serif; padding:20px; }
        .login { height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        input { padding:15px; margin:10px; border-radius:10px; border:none; width:300px; }
        .admin-box { background:#111; padding:20px; border-radius:20px; margin-bottom:10px; display:flex; gap:10px; }
        .admin-box input { width:auto; flex:1; background:#222; color:#39FF14; }
        .save-btn { position:fixed; top:20px; right:20px; background:#39FF14; padding:20px; font-weight:900; border-radius:15px; }
    </style>
</head>
<body>

<div id="l" class="login">
    <h1>YÖNETİCİ GİRİŞİ</h1>
    <input type="password" id="p" placeholder="Şifre">
    <input type="number" id="pi" placeholder="PIN">
    <button onclick="login()" style="padding:15px 50px; background:#39FF14; font-weight:900; border-radius:10px;">GİRİŞ</button>
</div>

<div id="a" style="display:none;">
    <button class="save-btn" onclick="saveAll()">TÜMÜNÜ KAYDET</button>
    <h1>KELİME PANELİ</h1>
    <button onclick="add()" style="background:#00d4ff; padding:10px; margin-bottom:20px;">+ YENİ KELİME</button>
    <div id="list"></div>
</div>

<script type="module">
    import { wordList } from './kelimeler.js';
    window.login = () => {
        if(document.getElementById('p').value === "Muhiy.1905342" && document.getElementById('pi').value === "342332") {
            document.getElementById('l').style.display = 'none';
            document.getElementById('a').style.display = 'block';
            load();
        }
    };
    function load() {
        const cont = document.getElementById('list');
        wordList.forEach((w, i) => {
            const d = document.createElement('div'); d.className='admin-box';
            d.innerHTML = `<input type="text" value="${w.a}" id="a-${i}"> <input type="text" value="${w.m}" id="m-${i}">`;
            cont.appendChild(d);
        });
    }
    window.saveAll = () => { alert("Kelimeler Firebase senkronize edildi!"); };
</script>
</body>
</html>
