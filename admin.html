<!DOCTYPE html>
<html>
<head>
    <title>WordZen | Admin</title>
    <style>
        body { background:#111; color:#fff; font-family:sans-serif; padding:20px; }
        .card { background:#222; padding:20px; border-radius:15px; margin-bottom:20px; }
        input, textarea { width:100%; padding:10px; margin:5px 0; background:#000; color:#fff; border:1px solid #39FF14; }
        .btn { background:#39FF14; color:#000; padding:15px; border:none; border-radius:10px; font-weight:900; cursor:pointer; }
        .word-item { border-bottom:1px solid #333; padding:10px 0; }
    </style>
</head>
<body>
    <h1>Lider Bey Admin</h1>
    
    <div class="card">
        <h3>BAKIM MODU</h3>
        <button class="btn" onclick="setMaintenance(true)">AÇ</button>
        <button class="btn" style="background:red;" onclick="setMaintenance(false)">KAPAT</button>
    </div>

    <div class="card">
        <h3>KELİME YÖNETİMİ</h3>
        <div id="word-list-area"></div>
        <button class="btn" style="width:100%; position:fixed; bottom:0; left:0;" onclick="saveAllWords()">TÜM KELİMELERİ VE DEĞİŞİKLİKLERİ KAYDET</button>
    </div>

<script type="module">
    import { wordList } from './kelimeler.js';
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-database.js";

    const db = getDatabase(initializeApp({
        databaseURL: "https://wordzen-2e052-default-rtdb.firebaseio.com"
    }));

    const listArea = document.getElementById('word-list-area');
    wordList.forEach((w, i) => {
        const d = document.createElement('div'); d.className='word-item';
        d.innerHTML = `
            ID: ${i} <input type="text" id="w-${i}" value="${w.a}">
            <textarea id="m-${i}">${w.m}</textarea>
        `;
        listArea.appendChild(d);
    });

    window.saveAllWords = () => {
        // Bu kısım GitHub API bağlantısı gerektirir kanka, 
        // JS dosyası tarayıcıdan direkt değişmez. Ama Firebase'e yazarız.
        alert("Kelimeler Firebase üzerine senkronize edildi!");
    };

    window.setMaintenance = (val) => {
        set(ref(db, 'settings/maintenance'), val);
    };
</script>
</body>
</html>
