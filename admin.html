<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WordZen | Master Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #050505; color: #fff; margin: 0; padding: 15px; }
        .container { max-width: 800px; margin: 0 auto; display: none; }
        h1 { color: #39FF14; text-align: center; font-size: 1.4rem; margin-bottom: 20px; text-shadow: 0 0 10px #39FF14; }
        
        /* GİRİŞ EKRANI */
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        
        .card { background: #111; padding: 20px; border-radius: 15px; border: 1px solid #222; margin-bottom: 15px; width: 100%; }
        .card-title { font-size: 0.8rem; color: #39FF14; margin-bottom: 15px; text-transform: uppercase; font-weight: 800; }
        
        input, textarea { width: 100%; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 12px; color: #fff; margin-bottom: 10px; font-family: inherit; }
        button { width: 100%; background: #39FF14; color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: 800; cursor: pointer; transition: 0.2s; margin-bottom: 5px; }
        button:active { transform: scale(0.96); }
        .btn-blue { background: #00d4ff; color: #000; }
        .btn-red { background: #ff4b2b; color: #fff; }

        /* KELİME LİSTESİ */
        #word-list-container { margin-top: 20px; display: none; }
        .word-item { background: #111; padding: 15px; border-radius: 10px; border-left: 4px solid #39FF14; margin-bottom: 10px; }
        .word-item input { margin-bottom: 5px; background: #000; border-color: #222; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="card" style="max-width: 350px;">
        <h1 style="font-size: 1.2rem;">MASTER AUTH</h1>
        <input type="password" id="admin-pass" placeholder="ŞİFRE">
        <input type="number" id="admin-pin" placeholder="2FA PIN">
        <button onclick="checkAuth()">SİSTEME GİR</button>
        <p id="err" style="color:#ff4b2b; font-size:0.7rem; display:none; text-align:center;">HATALI GİRİŞ!</p>
    </div>
</div>

<div class="container" id="admin-main">
    <h1>WORDZEN CONTROL UNIT</h1>

    <div class="card">
        <div class="card-title">HIZLI İŞLEMLER</div>
        <div class="grid-2">
            <button class="btn-blue" onclick="toggleList()">KELİMELERİ LİSTELE</button>
            <button class="btn-red" onclick="location.reload()">ÇIKIŞ YAP</button>
        </div>
    </div>

    <div class="card">
        <div class="card-title">YENİ KELİME EKLE</div>
        <input type="text" id="new-word" placeholder="KELİME">
        <textarea id="new-clue" placeholder="ANLAMI/İPUCU" rows="2"></textarea>
        <button onclick="addWord()">SİSTEME KAYDET</button>
    </div>

    <div id="word-list-container" class="card">
        <div class="card-title">MEVCUT KELİMELER (DÜZENLENEBİLİR)</div>
        <div id="word-list"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCFgWqiyOv1UWfehf8zUtu4XqsXTrRdcZc",
        authDomain: "wordzen-2e052.firebaseapp.com",
        databaseURL: "https://wordzen-2e052-default-rtdb.firebaseio.com",
        projectId: "wordzen-2e052",
        appId: "1:309225718128:web:8a38717b4b6fc8f3a18fb5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // 1. GÜVENLİK KONTROLÜ
    window.checkAuth = () => {
        const p = document.getElementById('admin-pass').value;
        const pin = document.getElementById('admin-pin').value;
        if(p === "Muhiy.1905342" && pin === "342332") {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('admin-main').style.display = 'block';
        } else {
            document.getElementById('err').style.display = 'block';
        }
    };

    // 2. KELİME EKLEME
    window.addWord = async () => {
        const w = document.getElementById('new-word').value.trim().toUpperCase();
        const c = document.getElementById('new-clue').value.trim();
        if(!w || !c) return alert("Eksik bilgi!");
        await set(ref(db, 'levels/' + w), { a: w, m: c });
        alert("Başarıyla eklendi!");
        document.getElementById('new-word').value = "";
        document.getElementById('new-clue').value = "";
    };

    // 3. LİSTELEME VE DÜZENLEME
    window.toggleList = () => {
        const container = document.getElementById('word-list-container');
        container.style.display = container.style.display === 'none' ? 'block' : 'none';
        if(container.style.display === 'block') loadWords();
    };

    function loadWords() {
        const listDiv = document.getElementById('word-list');
        onValue(ref(db, 'levels'), (snap) => {
            listDiv.innerHTML = "";
            const data = snap.val();
            if(data) {
                Object.keys(data).forEach(key => {
                    const item = data[key];
                    const div = document.createElement('div');
                    div.className = 'word-item';
                    div.innerHTML = `
                        <label style="font-size:0.6rem; color:#888;">KELİME</label>
                        <input type="text" id="edit-w-${key}" value="${item.a}">
                        <label style="font-size:0.6rem; color:#888;">ANLAMI</label>
                        <textarea id="edit-m-${key}">${item.m}</textarea>
                        <div class="grid-2">
                            <button onclick="saveEdit('${key}')">KAYDET</button>
                            <button class="btn-red" onclick="deleteWord('${key}')">SİL</button>
                        </div>
                    `;
                    listDiv.appendChild(div);
                });
            }
        });
    }

    window.saveEdit = async (key) => {
        const newW = document.getElementById('edit-w-'+key).value.toUpperCase();
        const newM = document.getElementById('edit-m-'+key).value;
        await update(ref(db, 'levels/' + key), { a: newW, m: newM });
        alert("Güncellendi!");
    };

    window.deleteWord = async (key) => {
        if(confirm("Silinsin mi?")) await remove(ref(db, 'levels/' + key));
    };
</script>
</body>
</html>
