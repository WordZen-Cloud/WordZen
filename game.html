<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WordZen | Oyun</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { width:100%; height:100vh; overflow:hidden; background:#000; font-family:sans-serif; display:flex; flex-direction:column; }
        
        .top { padding:20px; display:flex; justify-content:space-between; align-items:center; z-index:10; }
        .coin-pill { background:rgba(0,0,0,0.8); border:2px solid #ffcc00; color:#ffcc00; padding:10px 20px; border-radius:50px; font-weight:900; }

        /* Yan Butonlar (Yuvarlak) */
        .side-btns { position:fixed; right:15px; top:100px; display:flex; flex-direction:column; gap:15px; }
        .r-btn { width:55px; height:55px; border-radius:50%; border:none; display:flex; align-items:center; justify-content:center; font-size:1.5rem; color:#000; cursor:pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }

        #game-area { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding-bottom:42vh; }
        #word-row { display:flex; gap:8px; margin-bottom:20px; }
        .box { width:50px; height:65px; border:3px solid #fff; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:2rem; color:#fff; font-weight:900; background:rgba(0,0,0,0.5); }
        
        /* KLAVYE - YUKARI ALINDI VE GÜZELLEŞTİ */
        #kb { position:fixed; bottom:20px; width:100%; height:36vh; background:rgba(0,0,0,0.9); padding:8px; display:flex; flex-direction:column; gap:6px; }
        .row { display:flex; gap:4px; flex:1; }
        .key { flex:1; background:#333; border-radius:10px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:1.3rem; font-weight:900; border-bottom:4px solid #000; }
        .key:active { background:#39FF14; color:#000; transform:translateY(3px); }

        /* Combo Paneli */
        #combo-panel { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:rgba(57,255,20,0.9); color:#000; padding:30px; border-radius:20px; text-align:center; z-index:1000; font-weight:900; }
    </style>
</head>
<body>

<div class="top">
    <div class="coin-pill" onclick="location.href='index.html'"><i class="fas fa-home"></i></div>
    <div class="coin-pill">🪙 <span id="cc">0</span></div>
</div>

<div class="side-btns">
    <button class="r-btn" style="background:#ffcc00;" onclick="getHint()"><i class="fas fa-lightbulb"></i></button>
    <button class="r-btn" style="background:#ff4b2b;" onclick="passWord()"><i class="fas fa-forward"></i></button>
    <button class="r-btn" style="background:#00d4ff;" onclick="dailyGift()"><i class="fas fa-gift"></i></button>
</div>

<div id="game-area">
    <div id="word-row"></div>
    <div id="m-box" style="background:rgba(0,0,0,0.7); padding:15px; border-radius:15px; color:#fff; text-align:center; width:85%;">...</div>
</div>

<div id="combo-panel"><h1>TEBRİKLER!</h1><p>5X COMBO YAPTINIZ <br> +30 JETON HEDİYE!</p></div>

<div id="kb"></div>

<audio id="gmsc" loop src="fon-muzigi.mp3"></audio>

<script>

    const m = document.getElementById('gmsc');
    m.volume = localStorage.getItem('wz_mvol') || 0.5;
    m.play();

</script>
</body>
</html>
