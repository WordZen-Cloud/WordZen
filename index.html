<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
    <title>WordZen Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <style>
        * { -webkit-tap-highlight-color: transparent; outline: none; box-sizing: border-box; }
        
        html, body { 
            width: 100%; 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background: #000; 
            font-family: 'Montserrat', sans-serif; 
        }

        body { 
            background-size: cover; 
            background-position: center; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            transition: background 1.2s ease; 
        }

        /* VIDEO SPLASH SCREEN */
        #splash-screen { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: #000; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            z-index: 9999; 
        }
        #splash-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        /* ÜST UI VE SEVİYE GÖSTERGESİ */
        .top-ui { position: fixed; top: 20px; width: 90%; display: flex; justify-content: space-between; align-items: flex-start; z-index: 100; }
        
        #lvl-indicator { 
            position: fixed; 
            top: 25px; 
            left: 50%; 
            transform: translateX(-50%); 
            color: #39FF14; 
            font-size: 1.4rem; 
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
            z-index: 110;
        }

        .stat-box { background: rgba(0,0,0,0.7); color: #fff; padding: 8px 15px; border-radius: 12px; font-size: 0.8rem; border: 1px solid rgba(255,255,255,0.1); }
        
        .action-buttons { display: flex; flex-direction: column; gap: 8px; }
        .btn-game { padding: 10px 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 0.65rem; color: #000; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .btn-hint { background: #39FF14; }
        .btn-skip { background: #ffcc00; }

        /* OYUN ALANI */
        #game-area { 
            width: 100%; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            height: 55vh; 
            margin-top: 60px;
        }

        #word-display { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 25px; }
        .letter-box { width: 42px; height: 52px; background: #fff; color: #000; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; font-weight: 900; transition: 0.2s; box-shadow: 0 5px 15px rgba(0,0,0,0.4); }

        #clue-container { 
            color: #fff; 
            text-align: center; 
            padding: 20px; 
            background: rgba(0,0,0,0.5); 
            border-radius: 15px; 
            width: 85%; 
            border: 1px solid rgba(57,255,20,0.2);
        }

        /* ANIMASYONLAR */
        .correct-anim { transform: scale(1.15); background: #39FF14 !important; color: #000; }
        .wrong-anim { animation: shake 0.4s; background: #ff4b2b !important; color: #fff; }
        @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-6px);} 75%{transform:translateX(6px);} }

        /* MODAL */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); z-index: 9000; flex-direction: column; align-items: center; justify-content: center; }
        .modal-card { background: #111; padding: 25px; border-radius: 20px; border: 2px solid #333; width: 290px; text-align: center; }
        .btn-modal { padding: 12px 25px; border-radius: 12px; border: none; font-weight: bold; margin: 10px; cursor: pointer; font-size: 1rem; }
        .btn-yes { background: #39FF14; color: #000; }
        .btn-no { background: #ff4b2b; color: #fff; }

        /* GİZLİ INPUT */
        #hidden-input { position: absolute; bottom: 0; left: 0; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <video id="splash-video" autoplay muted playsinline>
            <source src="video.mp4" type="video/mp4">
            Tarayıcınız video etiketini desteklemiyor.
        </video>
    </div>

    <audio id="bg-music" src="fon-muzigi.mp3" loop preload="auto"></audio>
    <audio id="snd-correct" src="dogru.mp3" preload="auto"></audio>
    <audio id="snd-wrong" src="yanlis.mp3" preload="auto"></audio>

    <div id="lvl-indicator">LVL 1</div>

    <div class="top-ui">
        <div class="stats">
            <div class="stat-box">🪙 <span id="coin-txt">30</span></div>
        </div>
        <div class="action-buttons">
            <button class="btn-game btn-hint" onclick="useHint()">İPUCU (10)</button>
            <button class="btn-game btn-skip" onclick="askSkip()">ATLA (25)</button>
        </div>
    </div>

    <div id="game-area">
        <div id="word-display"></div>
        <div id="clue-container">
            <div id="clue-text" style="font-size: 0.9rem; line-height: 1.4;">...</div>
        </div>
    </div>

    <div id="skip-modal" class="modal-overlay">
        <div class="modal-card">
            <h3 style="color:#fff">Seviye Atlansın mı?</h3>
            <p style="color:#aaa; font-size: 0.85rem;">25 Jeton karşılığında bu bölümü geçmek istediğinize emin misiniz?</p>
            <button class="btn-modal btn-yes" onclick="confirmSkip()">EVET</button>
            <button class="btn-modal btn-no" onclick="closeModal()">HAYIR</button>
        </div>
    </div>

    <input type="text" id="hidden-input" autocomplete="off" spellcheck="false">

    <script type="module">
        import { levels as rawData } from './kelimeler.js';
        
        // KESİN SIRALAMA: 2 harfliler bitmeden 3'e geçmez
        const sortedLevels = [...rawData].sort((a, b) => a.a.length - b.a.length);

        let userData = JSON.parse(localStorage.getItem('wordzen_pro_data')) || { level: 0, coins: 30 };
        let currentWord = "";
        let isProcessing = false;

        const splashVideo = document.getElementById('splash-video');
        const splashScreen = document.getElementById('splash-screen');
        const bgMusic = document.getElementById('bg-music');

        // Video bittiğinde oyunu başlat
        splashVideo.onended = () => {
            splashScreen.style.transition = "0.8s";
            splashScreen.style.opacity = "0";
            setTimeout(() => {
                splashScreen.style.display = "none";
                bgMusic.volume = 0.5;
                bgMusic.play().catch(() => {
                    document.body.addEventListener('click', () => bgMusic.play(), { once: true });
                });
                initGame();
            }, 800);
        };

        // Eğer video autoplay hatası verirse veya yüklenemezse manuel geçiş
        setTimeout(() => {
            if(splashScreen.style.display !== "none") {
                splashScreen.style.display = "none";
                initGame();
            }
        }, 6000); 

        function initGame() {
            if(userData.level >= sortedLevels.length) userData.level = 0; 
            
            const data = sortedLevels[userData.level];
            currentWord = data.a.toUpperCase();
            
            document.getElementById('lvl-indicator').innerText = "LVL " + (userData.level + 1);
            document.getElementById('coin-txt').innerText = userData.coins;
            document.getElementById('clue-text').innerText = data.m;
            
            updateBackground();
            
            const container = document.getElementById('word-display');
            container.innerHTML = "";
            [...currentWord].forEach(() => {
                const b = document.createElement('div');
                b.className = 'letter-box';
                container.appendChild(b);
            });
            
            isProcessing = false;
            document.getElementById('hidden-input').focus();
        }

        const input = document.getElementById('hidden-input');
        document.body.onclick = (e) => {
            if(e.target.tagName !== 'BUTTON') {
                input.focus();
            }
        };

        input.oninput = (e) => {
            if(isProcessing) return;
            const char = e.target.value.toUpperCase().slice(-1);
            e.target.value = "";
            
            if (char.match(/[A-ZĞÜŞİÖÇ]/)) {
                const boxes = document.querySelectorAll('.letter-box');
                for (let b of boxes) {
                    if (b.innerText === "") {
                        b.innerText = char;
                        checkResult();
                        break;
                    }
                }
            }
        };

        input.onkeydown = (e) => {
            if (e.key === "Backspace") {
                const boxes = document.querySelectorAll('.letter-box');
                for (let i = boxes.length - 1; i >= 0; i--) {
                    if (boxes[i].innerText !== "") {
                        boxes[i].innerText = "";
                        break;
                    }
                }
            }
        };

        function checkResult() {
            const boxes = document.querySelectorAll('.letter-box');
            let typed = "";
            boxes.forEach(b => typed += b.innerText);

            if (typed.length === currentWord.length) {
                isProcessing = true;
                if (typed === currentWord) {
                    const sndCorrect = document.getElementById('snd-correct');
                    sndCorrect.currentTime = 0;
                    sndCorrect.play();
                    
                    boxes.forEach(b => b.classList.add('correct-anim'));
                    
                    userData.level++;
                    userData.coins += 3;
                    save();
                    setTimeout(initGame, 1000);
                } else {
                    const sndWrong = document.getElementById('snd-wrong');
                    sndWrong.currentTime = 0;
                    sndWrong.play();
                    
                    boxes.forEach(b => {
                        b.classList.add('wrong-anim');
                        setTimeout(() => {
                            b.classList.remove('wrong-anim');
                            b.innerText = "";
                            isProcessing = false;
                        }, 500);
                    });
                }
            }
        }

        window.useHint = () => {
            if(userData.coins < 10) return alert("Yetersiz Jeton!");
            const boxes = document.querySelectorAll('.letter-box');
            let emptyIndexes = [];
            boxes.forEach((b, i) => { if(b.innerText === "") emptyIndexes.push(i); });
            
            if(emptyIndexes.length > 0) {
                let randIdx = emptyIndexes[Math.floor(Math.random() * emptyIndexes.length)];
                boxes[randIdx].innerText = currentWord[randIdx];
                userData.coins -= 10;
                save();
                checkResult();
            }
        };

        window.askSkip = () => {
            document.getElementById('skip-modal').style.display = 'flex';
        };

        window.confirmSkip = () => {
            if(userData.coins < 25) {
                alert("Yetersiz Jeton!");
                closeModal();
                return;
            }
            userData.coins -= 25;
            userData.level++;
            save();
            closeModal();
            initGame();
        };

        window.closeModal = () => document.getElementById('skip-modal').style.display = 'none';

        function save() {
            localStorage.setItem('wordzen_pro_data', JSON.stringify(userData));
            document.getElementById('coin-txt').innerText = userData.coins;
        }

        function updateBackground() {
            let bgNum = Math.floor(userData.level / 10) + 1;
            if(bgNum > 45) bgNum = 45;
            document.body.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('bg${bgNum}.jpg')`;
        }
    </script>
</body>
</html>
