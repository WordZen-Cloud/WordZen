<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WordZen | Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body, html { width:100%; height:100%; background:#000; font-family:'Montserrat', sans-serif; color:#fff; overflow:hidden; }
        
        /* Splash Video */
        #splash-container { position:fixed; top:0; left:0; width:100%; height:100%; z-index:9999; background:#000; }
        #splash-vid { width:100%; height:100%; object-fit:cover; }

        /* Profil ve Mod Ekranları */
        .screen { position:absolute; top:0; left:0; width:100%; height:100%; display:none; flex-direction:column; align-items:center; justify-content:center; padding:20px; text-align:center; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); }
        .active { display:flex; }

        input, select { width:80%; padding:15px; margin:10px 0; border-radius:12px; border:1px solid #39FF14; background:rgba(0,0,0,0.5); color:#fff; font-size:1rem; outline:none; }
        .btn { width:80%; padding:15px; margin:10px 0; border-radius:12px; border:none; font-weight:900; cursor:pointer; transition:0.3s; text-transform:uppercase; }
        .btn-green { background:#39FF14; color:#000; box-shadow:0 0 20px rgba(57,255,20,0.4); }
        .btn-blue { background:#00d4ff; color:#000; }

        .mod-box { width:90%; padding:25px; margin:10px; border:2px solid rgba(255,255,255,0.1); border-radius:20px; background:rgba(255,255,255,0.05); }
        .mod-title { font-size:1.5rem; font-weight:900; margin-bottom:5px; }
        .mod-desc { font-size:0.8rem; opacity:0.6; margin-bottom:15px; }

        #bg-preloader { display:none; }
    </style>
</head>
<body>

    <div id="splash-container">
        <video id="splash-vid" autoplay muted playsinline>
            <source src="video.mp4" type="video/mp4">
        </video>
    </div>

    <div id="profile-screen" class="screen">
        <h1 style="margin-bottom:20px; letter-spacing:5px;">PROFİL OLUŞTUR</h1>
        <input type="text" id="username" placeholder="Kullanıcı Adı">
        <input type="number" id="userage" placeholder="Yaş">
        <select id="usergender">
            <option value="Erkek">Erkek</option>
            <option value="Kadın">Kadın</option>
        </select>
        <button class="btn btn-green" onclick="saveProfile()">DEVAM ET</button>
    </div>

    <div id="mode-screen" class="screen">
        <div class="mod-box" onclick="startMode('normal')">
            <div class="mod-title" style="color:#39FF14">NORMAL MOD</div>
            <div class="mod-desc">250+ Kelime, İnternetsiz, Seviye İlerlemeli</div>
            <button class="btn btn-green">OYNA</button>
        </div>
        <div class="mod-box" onclick="startMode('pvp')">
            <div class="mod-title" style="color:#00d4ff">1V1 RANDOM</div>
            <div class="mod-desc">Rastgele Bir Rakiple Kapış, Jetonları Topla</div>
            <button class="btn btn-blue">EŞLEŞ</button>
        </div>
        <div class="mod-box" onclick="startMode('room')">
            <div class="mod-title" style="color:#ffcc00">1V1 ODA (WZ-)</div>
            <div class="mod-desc">Arkadaşınla Oda Kur ve Jetonuna Kapış</div>
            <button class="btn" style="background:#ffcc00; color:#000;">ODA KUR/GİR</button>
        </div>
    </div>

    <audio id="bg-music" loop src="fon-muzigi.mp3"></audio>
    
    <div id="bg-preloader"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
    import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCFgWqiyOv1UWfehf8zUtu4XqsXTrRdcZc",
        authDomain: "wordzen-2e052.firebaseapp.com",
        databaseURL: "https://wordzen-2e052-default-rtdb.firebaseio.com",
        projectId: "wordzen-2e052",
        appId: "1:309225718128:web:8a38717b4b6fc8f3a18fb5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const vid = document.getElementById('splash-vid');
    const bgMusic = document.getElementById('bg-music');

    // 1. Splash Bitiş ve Müzik
    vid.onended = () => {
        document.getElementById('splash-container').style.display = 'none';
        bgMusic.play();
        checkUser();
    };

    // 2. Arka Planları Önden Yükle (42 Adet)
    function preloadImages() {
        const preloader = document.getElementById('bg-preloader');
        for(let i=1; i<=42; i++) {
            const img = new Image();
            img.src = `bg${i}.jpg`;
            preloader.appendChild(img);
        }
    }
    preloadImages();

    // 3. Kullanıcı Kontrol
    function checkUser() {
        const saved = localStorage.getItem('wz_profile');
        if(saved) {
            document.getElementById('mode-screen').classList.add('active');
        } else {
            document.getElementById('profile-screen').classList.add('active');
        }
    }

    window.saveProfile = () => {
        const name = document.getElementById('username').value;
        const age = document.getElementById('userage').value;
        const gender = document.getElementById('usergender').value;

        if(!name || !age) return alert("Boş bırakma kanka!");

        const profile = { name, age, gender, coins: 500, level: 1 };
        localStorage.setItem('wz_profile', JSON.stringify(profile));
        
        // Firebase'e de yedekle
        const uid = "U" + Math.floor(Math.random()*999999);
        localStorage.setItem('wz_uid', uid);
        set(ref(db, 'users/' + uid), profile);

        document.getElementById('profile-screen').classList.remove('active');
        document.getElementById('mode-screen').classList.add('active');
    };

    window.startMode = (mode) => {
        if(mode === 'normal') window.location.href = 'normal.html';
        if(mode === 'pvp' || mode === 'room') window.location.href = 'pvp.html';
    };

    // Bakım Modu Kontrolü
    onValue(ref(db, 'settings/maintenance'), (snap) => {
        if(snap.val() === true) {
            document.body.innerHTML = "<h1 style='color:#39FF14; text-align:center; margin-top:100px;'>BAKIM MODU AÇILMIŞTIR ANLAYIŞINIZ İÇİN TEŞEKKÜREDERİZ.</h1>";
        }
    });

</script>
</body>
</html>
