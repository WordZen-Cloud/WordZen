<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WordZen | Kayıt</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { background:#000; color:#fff; font-family:'Montserrat', sans-serif; overflow:hidden; }
        
        .container { display:flex; height:100vh; flex-direction:column; align-items:center; justify-content:center; padding:20px; background:radial-gradient(circle, #1a2a6c, #000); }
        .glass-card { background:rgba(255,255,255,0.1); backdrop-filter:blur(15px); border:1px solid rgba(255,255,255,0.2); padding:30px; border-radius:30px; width:90%; max-width:400px; text-align:center; }
        
        /* Profil Resim Butonu */
        #p-img-btn { width:100px; height:100px; border-radius:50%; border:3px solid #39FF14; background:#222; margin:0 auto 15px; cursor:pointer; overflow:hidden; position:relative; }
        #p-img { width:100%; height:100%; object-fit:cover; display:none; }
        #p-img-btn i { font-size:2rem; color:#39FF14; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); }

        .m-input { width:100%; padding:15px; margin:10px 0; border-radius:15px; background:rgba(0,0,0,0.5); border:1px solid #444; color:#fff; text-align:center; font-weight:800; font-size:1.1rem; }
        
        /* Cinsiyet Seçim Barı - Modern */
        .gen-bar { display:flex; gap:10px; margin:10px 0; }
        .gen-opt { flex:1; padding:15px; background:rgba(255,255,255,0.05); border-radius:15px; cursor:pointer; border:2px solid transparent; transition:0.3s; color:#888; }
        .gen-opt.active { background:rgba(57,255,20,0.1); border-color:#39FF14; color:#fff; }

        .btn-reg { width:100%; padding:18px; border-radius:20px; border:none; font-weight:900; font-size:1.2rem; cursor:pointer; background:#39FF14; color:#000; text-transform:uppercase; margin-top:15px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="glass-card">
            <h2 style="margin-bottom:20px;">KAYIT OL</h2>
            
            <div id="p-img-btn" onclick="document.getElementById('f-in').click()">
                <img id="p-img" src="">
                <i class="fas fa-camera"></i>
            </div>
            <input type="file" id="f-in" accept="image/*" hidden onchange="loadImg(this)">

            <input type="text" id="nn" class="m-input" placeholder="İSİM VEYA KULLANICI ADI">
            <input type="number" id="age" class="m-input" placeholder="YAŞINIZ">
            
            <div class="gen-bar">
                <div class="gen-opt" id="g-m" onclick="setGen('Erkek')">ERKEK</div>
                <div class="gen-opt" id="g-f" onclick="setGen('Kız')">KIZ</div>
            </div>

            <button class="btn-reg" onclick="saveP()">KAYDIYI TAMAMLA</button>
        </div>
    </div>

<script src="https://kit.fontawesome.com/a076d05399.js"></script>
<script>
    let uImg = null;
    let uGen = null;

    function loadImg(input) {
        if (input.files && input.files[0]) {
            const r = new FileReader();
            r.onload = function(e) {
                document.getElementById('p-img').src = e.target.result;
                document.getElementById('p-img').style.display = 'block';
                document.querySelector('#p-img-btn i').style.display = 'none';
                uImg = e.target.result;
            }
            r.readAsDataURL(input.files[0]);
        }
    }

    function setGen(g) {
        uGen = g;
        document.getElementById('g-m').classList.remove('active');
        document.getElementById('g-f').classList.remove('active');
        if(g === 'Erkek') document.getElementById('g-m').classList.add('active');
        else document.getElementById('g-f').classList.add('active');
    }

    function saveP() {
        const name = document.getElementById('nn').value;
        const age = document.getElementById('age').value;
        if(!name || !age || !uGen) return alert("Eksik bilgi kanka!");
        
        const user = { name: name, age: age, gender: uGen, img: uImg, coins: 500 };
        localStorage.setItem('wz_user', JSON.stringify(user));
        location.href = 'modlar.html'; // Kayıtlı mod ekranına yönlendir
    }
</script>
</body>
</html>
