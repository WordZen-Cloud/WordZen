<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WordZen | Başlangıç</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#000; color:#fff; font-family:'Montserrat', sans-serif; overflow:hidden; }
        
        #splash { position:fixed; top:0; left:0; width:100%; height:100%; z-index:10000; background:#000; }
        #splash-vid { width:100%; height:100%; object-fit:cover; }

        .container { display:none; height:100vh; flex-direction:column; align-items:center; justify-content:center; padding:20px; }
        .active { display:flex; }

        /* Mod Kartları - Görseldeki gibi */
        .card { background:#111; width:90%; padding:25px; border-radius:25px; border:1px solid #333; margin:10px 0; text-align:center; }
        .card h2 { font-size:1.8rem; margin-bottom:5px; }
        .card p { color:#888; font-size:0.9rem; margin-bottom:15px; }
        
        .btn-play { width:100%; padding:18px; border-radius:15px; border:none; font-weight:900; cursor:pointer; font-size:1.2rem; transition:0.3s; }
        .normal { color:#39FF14; } .normal-btn { background:#39FF14; color:#000; }
        .pvp { color:#00d4ff; } .pvp-btn { background:#00d4ff; color:#000; }
        .room { color:#ffcc00; } .room-btn { background:#ffcc00; color:#000; }

        input, select { width:85%; padding:15px; margin:10px 0; border-radius:12px; background:#222; border:1px solid #444; color:#fff; text-align:center; }
    </style>
</head>
<body>

<div id="splash">
    <video id="splash-vid" autoplay playsinline>
        <source src="video.mp4" type="video/mp4">
    </video>
</div>

<div id="profile-screen" class="container">
    <h1 style="color:#39FF14; margin-bottom:20px;">PROFİLİNİ OLUŞTUR</h1>
    <input type="text" id="uname" placeholder="Kullanıcı Adı">
    <input type="number" id="uage" placeholder="Yaş">
    <select id="ugender">
        <option value="Erkek">Erkek</option>
        <option value="Kadın">Kadın</option>
    </select>
    <button class="btn-play normal-btn" onclick="save()">KAYDET VE GİRİŞ YAP</button>
</div>

<div id="mode-screen" class="container">
    <div class="card">
        <h2 class="normal">NORMAL MOD</h2>
        <p>İnternetsiz Seviyeli Oyun</p>
        <button class="btn-play normal-btn" onclick="location.href='normal.html'">OYNA</button>
    </div>
    <div class="card">
        <h2 class="pvp">1V1 RANDOM</h2>
        <p>Rastgele Rakiple Kapış</p>
        <button class="btn-play pvp-btn" onclick="location.href='pvp.html?mode=random'">EŞLEŞ</button>
    </div>
    <div class="card">
        <h2 class="room">1V1 ODA</h2>
        <p>Oda Numarasıyla (WZ-) Kapış</p>
        <button class="btn-play room-btn" onclick="location.href='pvp.html?mode=room'">GİRİŞ YAP</button>
    </div>
</div>

<audio id="main-music" loop src="fon-muzigi.mp3"></audio>

<script>
    const vid = document.getElementById('splash-vid');
    const music = document.getElementById('main-music');

    vid.onended = () => {
        document.getElementById('splash').style.display = 'none';
        music.play().catch(() => {
            document.addEventListener('click', () => music.play(), {once:true});
        });
        if(localStorage.getItem('wz_user')) {
            document.getElementById('mode-screen').classList.add('active');
        } else {
            document.getElementById('profile-screen').classList.add('active');
        }
    };

    function save() {
        const user = { 
            name: document.getElementById('uname').value, 
            age: document.getElementById('uage').value,
            gender: document.getElementById('ugender').value,
            coins: 500, level: 1
        };
        if(!user.name || !user.age) return alert("Eksik bilgi!");
        localStorage.setItem('wz_user', JSON.stringify(user));
        location.reload();
    }
</script>
</body>
</html>
