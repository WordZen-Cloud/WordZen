<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WordZen | Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body, html { width:100%; height:100%; background:#000; font-family:'Montserrat', sans-serif; color:#fff; overflow:hidden; }
        
        #splash-container { position:fixed; top:0; left:0; width:100%; height:100%; z-index:10000; background:#000; display:flex; }
        #splash-vid { width:100%; height:100%; object-fit:cover; }

        .screen { position:absolute; top:0; left:0; width:100%; height:100%; display:none; flex-direction:column; align-items:center; justify-content:center; padding:20px; text-align:center; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); }
        .active { display:flex; }

        /* Modern Cinsiyet Seçimi Paneli */
        .gender-container { display:flex; gap:20px; margin:20px 0; }
        .gender-box { width:120px; height:120px; border:2px solid rgba(255,255,255,0.1); border-radius:20px; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; transition:0.3s; background:rgba(255,255,255,0.05); }
        .gender-box.selected { border-color:#39FF14; background:rgba(57,255,20,0.1); box-shadow:0 0 15px #39FF14; }
        .gender-box i { font-size:2rem; margin-bottom:10px; }

        input { width:85%; padding:18px; margin:10px 0; border-radius:15px; border:2px solid #333; background:rgba(0,0,0,0.6); color:#fff; font-size:1.1rem; outline:none; text-align:center; }
        input:focus { border-color:#39FF14; }

        .btn { width:85%; padding:20px; margin:10px 0; border-radius:15px; border:none; font-weight:900; cursor:pointer; transition:0.3s; text-transform:uppercase; font-size:1.2rem; letter-spacing:2px; }
        .btn-normal { background:#39FF14; color:#000; box-shadow:0 10px 20px rgba(57,255,20,0.3); }
        .btn-pvp { background:#00d4ff; color:#000; box-shadow:0 10px 20px rgba(0,212,255,0.3); }
        
        #bg-preloader { display:none; }
    </style>
</head>
<body>

    <div id="splash-container">
        <video id="splash-vid" autoplay muted playsinline>
            <source src="video.mp4" type="video/mp4">
        </video>
    </div>

    <div id="profile-screen" class="screen">
        <h1 style="color:#39FF14; margin-bottom:10px;">PROFİLİNİ KUR</h1>
        <input type="text" id="username" placeholder="Kullanıcı Adı">
        <input type="number" id="userage" placeholder="Yaş">
        
        <div class="gender-container">
            <div class="gender-box" id="box-Erkek" onclick="selectGender('Erkek')">
                <span style="font-size:2.5rem;">👦</span>
                <span style="font-size:0.8rem; margin-top:5px;">ERKEK</span>
            </div>
            <div class="gender-box" id="box-Kadın" onclick="selectGender('Kadın')">
                <span style="font-size:2.5rem;">👧</span>
                <span style="font-size:0.8rem; margin-top:5px;">KADIN</span>
            </div>
        </div>
        
        <button class="btn btn-normal" onclick="saveProfile()">OYUNA BAŞLA</button>
    </div>

    <div id="mode-screen" class="screen">
        <h1 style="letter-spacing:10px; margin-bottom:40px;">WORDZEN</h1>
        <button class="btn btn-normal" onclick="location.href='normal.html'">NORMAL MOD</button>
        <button class="btn btn-pvp" onclick="location.href='pvp.html?type=random'">1V1 RANDOM</button>
        <button class="btn" style="background:#ffcc00; color:#000;" onclick="location.href='pvp.html?type=room'">1V1 ODA (WZ-)</button>
    </div>

    <audio id="bg-music" loop src="fon-muzigi.mp3"></audio>
    <div id="bg-preloader"></div>

<script type="module">
    let selectedGender = "";
    const vid = document.getElementById('splash-vid');
    const bgMusic = document.getElementById('bg-music');

    // Video bitince müzik başlar, bir daha susmaz
    vid.onended = () => {
        document.getElementById('splash-container').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('splash-container').style.display = 'none';
            bgMusic.play();
            checkUser();
        }, 500);
    };

    window.selectGender = (g) => {
        selectedGender = g;
        document.querySelectorAll('.gender-box').forEach(b => b.classList.remove('selected'));
        document.getElementById('box-' + g).classList.add('selected');
    };

    function checkUser() {
        if(localStorage.getItem('wz_profile')) {
            document.getElementById('mode-screen').classList.add('active');
        } else {
            document.getElementById('profile-screen').classList.add('active');
        }
    }

    window.saveProfile = () => {
        const name = document.getElementById('username').value;
        const age = document.getElementById('userage').value;
        if(!name || !age || !selectedGender) return alert("Eksik bilgi bırakma kanka!");
        
        const profile = { name, age, gender: selectedGender, coins: 500, level: 1 };
        localStorage.setItem('wz_profile', JSON.stringify(profile));
        location.reload();
    };

    // 42 Arka planı önden yükle (Kasmasız geçiş için)
    for(let i=1; i<=42; i++) {
        const img = new Image(); img.src = `bg${i}.jpg`;
        document.getElementById('bg-preloader').appendChild(img);
    }
</script>
</body>
</html>
