    <meta charset="UTF-8">

    <title>WordZen Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <style>
        * { -webkit-tap-highlight-color: transparent; outline: none; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Montserrat', sans-serif; }
        body { background-size: cover; background-position: center; display: flex; flex-direction: column; align-items: center; }

        /* YENİ ÖZEL AÇILIŞ EKRANI */
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #111 0%, #000 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: 0.8s; }
        .splash-logo { font-size: 3rem; color: #fff; text-shadow: 0 0 30px #39FF14; letter-spacing: 5px; animation: glow 2s infinite alternate; }
        @keyframes glow { from { text-shadow: 0 0 10px #39FF14; transform: scale(1); } to { text-shadow: 0 0 30px #39FF14, 0 0 50px #39FF14; transform: scale(1.05); } }
        .loader-bar { width: 200px; height: 4px; background: #222; margin-top: 30px; border-radius: 10px; overflow: hidden; border: 1px solid #333; }
        #progress { width: 0%; height: 100%; background: linear-gradient(90deg, #39FF14, #00d4ff); transition: 0.2s; }
        .fade-out { opacity: 0; visibility: hidden; }

        /* UI PANELLERİ */
        .info-panel { position: absolute; top: 20px; left: 20px; z-index: 1000; }
        .info-item { background: rgba(0,0,0,0.8); color: #fff; padding: 8px 15px; border-radius: 12px; font-size: 0.65rem; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 5px; }
        .coin-panel { position: absolute; top: 20px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 8px; align-items: flex-end; }
        #coin-display { background: rgba(0,0,0,0.8); padding: 8px 18px; border-radius: 20px; color: #ffcc00; font-size: 1rem; border: 1px solid #ffcc00; }
        .btn-round { width: 52px; height: 52px; border-radius: 50%; border: none; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.65rem; color: #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }

        #game-area { width: 100%; display: flex; flex-direction: column; align-items: center; margin-top: 80px; flex: 1; }
        #word-display { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 25px; min-height: 55px; }
        .letter-box { width: 42px; height: 52px; background: #fff; color: #000; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; font-weight: 900; }

        /* OYUN KLAVYESİ (29 HARF - BÜYÜK BUTONLAR) */
        #keyboard-area { width: 100%; padding: 10px; display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); padding-bottom: env(safe-area-inset-bottom); }
        .key { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.1); color: #fff; height: 45px; border-radius: 6px; font-size: 1.1rem; font-weight: 800; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .key:active { background: #39FF14; color: #000; transform: scale(0.95); }
        .key-wide { grid-column: span 2; background: #ff4b2b; }

        .shake { animation: shake 0.3s; background: #ff4b2b !important; color: #fff; }
        @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-5px);} 75%{transform:translateX(5px);} }
    </style>
</head>

        ];

        const tr_alphabet = "ABCÇDEFGĞHIİJKLMNOÖPRSŞTUÜVYZ".split('');

        window.onload = () => {
            let p = 0;
            let i = setInterval(() => {
                p += 5; document.getElementById('progress').style.width = p + '%';
                if(p >= 100) { clearInterval(i); setTimeout(()=> {
                    document.getElementById('splash-screen').classList.add('fade-out');
                    startMusic(); // Splash bitince müziği dene
                }, 500); }
            }, 50);
            createKeyboard();
        };

        function startMusic() {
            const m = document.getElementById('bg-music');
            m.play().catch(() => {
                // Tarayıcı engellerse ilk tıkta başlatmak için yedek:
                document.body.addEventListener('click', () => { m.play(); }, {once: true});
            });
        }

        const userRef = ref(db, 'users/' + userId);
        onValue(userRef, (snap) => {
            const data = snap.val();
            if(data) { coins = data.coins; currentLevel = data.level; render(); }
            else { set(userRef, { coins: 30, level: 0, id: userId }); }
        });

        function createKeyboard() {
            const kb = document.getElementById('keyboard-area');
            kb.innerHTML = "";
            tr_alphabet.forEach(letter => {
                const k = document.createElement('div');
                k.className = 'key';
                k.innerText = letter;
                k.onclick = () => addLetter(letter);
                kb.appendChild(k);
            });
            const del = document.createElement('div');
            del.className = 'key key-wide';
            del.innerText = "SİL";
            del.onclick = removeLetter;
            kb.appendChild(del);
        }

        function render() {
            document.getElementById('coin-count').innerText = coins;
            document.getElementById('lvl-txt').innerText = currentLevel + 1;
            document.getElementById('player-id').innerText = userId;
            const levelData = levels[currentLevel % levels.length];
            document.getElementById('clue-text').innerText = levelData.m;

            let bgNum = (currentLevel % 42) + 1;
            document.body.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('bg${bgNum}.jpg')`;

            const container = document.getElementById('word-display');
            container.innerHTML = "";
            levelData.a.split('').forEach(() => {
                const b = document.createElement('div'); b.className = 'letter-box'; container.appendChild(b);
            });
        }

        function addLetter(l) {
            playSnd('snd-click');
            const boxes = document.querySelectorAll('.letter-box');
            for (let b of boxes) { if (b.innerText === "") { b.innerText = l; checkWin(); break; } }
        }

        function removeLetter() {
            playSnd('snd-click');
            const boxes = document.querySelectorAll('.letter-box');
            for (let i = boxes.length - 1; i >= 0; i--) {
                if (boxes[i].innerText !== "") { boxes[i].innerText = ""; break; }
            }
        }

        function checkWin() {
            const levelData = levels[currentLevel % levels.length];
            let res = "";
            document.querySelectorAll('.letter-box').forEach(b => res += b.innerText);
            if(res.length === levelData.a.length) {
                if(res === levelData.a) {
                    playSnd('snd-correct'); // ANINDA ÇALACAK
                    document.querySelectorAll('.letter-box').forEach(b => b.style.background = "#39FF14");
                    setTimeout(() => update(userRef, { coins: coins + 5, level: currentLevel + 1 }), 400);
                } else {
                    playSnd('snd-wrong'); // ANINDA ÇALACAK
                    document.querySelectorAll('.letter-box').forEach(b => {
                        b.classList.add('shake');
                        setTimeout(() => { b.classList.remove('shake'); b.innerText = ""; }, 500);
                    });
                }
            }
        }

        // SESLERİ GECİKMESİZ ÇALMA FONKSİYONU
        function playSnd(id) {
            let s = document.getElementById(id);
            if(s) {
                s.pause();
                s.currentTime = 0; // Başa sar ki gecikmesin
                s.play().catch(()=>{});
            }
        }

        window.useHint = () => {
            if(coins < 10) return alert("Jeton Yetersiz!");
            const levelData = levels[currentLevel % levels.length];
            const boxes = document.querySelectorAll('.letter-box');
            for(let i=0; i<boxes.length; i++) {
                if(boxes[i].innerText === "") { 
                    boxes[i].innerText = levelData.a[i]; 
                    update(userRef, {coins: coins - 10}).then(() => checkWin());
                    break; 
                }
            }
        };

        window.askSkipLevel = () => { if(coins >= 25) update(userRef, { coins: coins - 25, level: currentLevel + 1 }); else alert("Jeton Yetersiz!"); };
    </script>
</body>
</html>
