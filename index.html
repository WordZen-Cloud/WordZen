<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WordZen PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#000; color:#fff; font-family:'Montserrat', sans-serif; overflow:hidden; }
        
        /* 1. Splash Screen */
        #splash { position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:999; display:flex; align-items:center; justify-content:center; }
        #splash video { width:100%; height:100%; object-fit:cover; }

        /* 2. Kayıt & Mod Seçimi */
        .screen { display:none; height:100vh; width:100%; flex-direction:column; align-items:center; justify-content:center; position:absolute; }
        .active { display:flex !important; }
        
        .card { background:rgba(20,20,20,0.9); padding:30px; border-radius:30px; width:90%; max-width:400px; text-align:center; border:1px solid #333; }
        input, select { width:100%; padding:15px; margin:10px 0; border-radius:15px; background:#111; border:1px solid #444; color:#fff; text-align:center; }
        button { width:100%; padding:20px; border-radius:20px; border:none; font-weight:900; cursor:pointer; margin-top:10px; text-transform:uppercase; transition:0.3s; }
        
        /* Mod Butonları */
        .btn-normal { background:#39FF14; color:#000; }
        .btn-1v1 { background:#00d4ff; color:#000; }
        .btn-random { background:#ffcc00; color:#000; }

        /* Jeton Animasyonu Barı */
        #coin-bar { position:fixed; top:10px; right:10px; background:rgba(0,0,0,0.8); padding:10px 20px; border-radius:30px; border:1px solid #ffcc00; z-index:100; display:flex; align-items:center; }
        .flying-coin { position:fixed; width:25px; height:25px; background:#ffcc00; border-radius:50%; z-index:200; pointer-events:none; box-shadow:0 0 10px #ffcc00; }

        /* Arena Arka Planı */
        #arena-bg { position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1; transition: opacity 0.5s ease-in-out; background-size: cover; background-position: center; }

        /* Zaman Barı */
        #time-container { width:100%; height:8px; background:#222; position:absolute; top:0; left:0; }
        #time-bar { width:100%; height:100%; background:#ff4b2b; transition: width 1s linear; }

        /* Klavye Boyu Ayarı */
        #k-in { width:100%; height:60px; font-size:1.5rem; text-align:center; background:#111; border:2px solid #00d4ff; color:#fff; position:fixed; bottom:20px; width:90%; left:5%; border-radius:15px; }
    </style>
</head>
<body>

    <div id="splash">
        <video id="intro-vid" muted playsinline>
            <source src="video.mp4" type="video/mp4">
        </video>
    </div>

    <div id="coin-bar">💰 <span id="user-coins">0</span></div>

    <div id="reg-screen" class="screen">
        <div class="card">
            <h2>HOŞ GELDİN</h2>
            <input type="text" id="u-name" placeholder="KULLANICI ADI">
            <input type="number" id="u-age" placeholder="YAŞ">
            <select id="u-gen">
                <option value="Erkek">ERKEK</option>
                <option value="Kadın">KADIN</option>
            </select>
            <button class="btn-normal" onclick="completeReg()">KAYDET</button>
        </div>
    </div>

    <div id="mode-screen" class="screen">
        <div class="card">
            <h2>MOD SEÇ</h2>
            <button class="btn-normal" onclick="startNormal()">NORMAL MOD</button>
            <button class="btn-1v1" onclick="open1v1Lobby()">1V1 ÖZEL ODA</button>
            <button class="btn-random" onclick="startRandom()">1V1 RANDOM</button>
        </div>
    </div>

    <div id="lobby-1v1" class="screen">
        <div class="card">
            <h2>1V1 ARENA</h2>
            <input type="number" id="bet-coin" placeholder="BAHİS JETON (Örn: 500)">
            <button class="btn-1v1" onclick="createRoom()">ODA KUR</button>
            <div style="margin:10px;">- VEYA -</div>
            <input type="text" id="room-id-in" placeholder="WZ-XXXXXX">
            <button class="btn-normal" onclick="joinRoom()">ODAYA GİR</button>
            <button style="background:none; color:#aaa;" onclick="showModes()">GERİ</button>
        </div>
    </div>

    <div id="arena-bg"></div>

    <div id="game-arena" class="screen" style="justify-content:flex-start; padding-top:50px;">
        <div id="time-container"><div id="time-bar"></div></div>
        <div id="q-hint" style="padding:20px; font-size:1.2rem; text-align:center;">Soru Yükleniyor...</div>
        <div id="word-slots" style="display:flex; gap:10px; margin-top:20px;"></div>
        <input type="text" id="k-in" maxlength="15" placeholder="BURAYA YAZ">
        <button id="hint-btn" onclick="useHint()" style="width:auto; padding:10px 20px; background:#ffcc00; position:fixed; bottom:100px;">İPUCU (-50 Jeton)</button>
    </div>

    <audio id="snd-bg" loop src="fon-muzigi.mp3"></audio>
    <audio id="snd-true" src="dogru.mp3"></audio>
    <audio id="snd-false" src="yanlis.mp3"></audio>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, remove } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-database.js";
    import { wordList } from './kelimeler.js';

    const firebaseConfig = { databaseURL: "https://wordzen-2e052-default-rtdb.firebaseio.com" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let user = JSON.parse(localStorage.getItem('wz_pro')) || null;
    let bgIndex = 1;
    let wordCounter = 0;
    let timerInterval;

    // --- 1. SPLASH VE GİRİŞ ---
    const vid = document.getElementById('intro-vid');
    vid.play();
    vid.onended = () => {
        document.getElementById('splash').style.display = 'none';
        document.getElementById('snd-bg').play();
        if(!user) showScreen('reg-screen'); else showScreen('mode-screen');
    };

    window.completeReg = () => {
        const name = document.getElementById('u-name').value;
        const age = document.getElementById('u-age').value;
        if(!name || !age) return alert("Bilgileri gir!");
        user = { name, age, gender: document.getElementById('u-gen').value, coins: 1000, lv: 1 };
        localStorage.setItem('wz_pro', JSON.stringify(user));
        showScreen('mode-screen');
        updateCoinUI();
    };

    // --- 2. FONKSİYONLAR ---
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function updateCoinUI() {
        document.getElementById('user-coins').innerText = user.coins;
    }
