<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WordZen | Master</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { background:#000; color:#fff; font-family:'Montserrat', sans-serif; overflow:hidden; }
        
        /* Splash - Atla Butonu Kaldırıldı */
        #splash { position:fixed; top:0; left:0; width:100%; height:100%; z-index:10000; background:#000; display:flex; align-items:center; justify-content:center; }
        #splash-vid { width:100%; height:100%; object-fit:cover; }

        .container { display:none; height:100vh; flex-direction:column; align-items:center; justify-content:center; padding:20px; background: radial-gradient(circle, #1a2a6c, #000); }
        .active { display:flex !important; }

        /* Profil & Ayarlar */
        .settings-btn { position:fixed; top:20px; right:20px; font-size:1.8rem; color:#fff; z-index:100; cursor:pointer; }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:200; align-items:center; justify-content:center; }
        .glass-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.2); padding: 30px; border-radius: 30px; width: 90%; max-width: 400px; text-align: center; }

        /* Mod Ekranı Tasarımı (Değişmedi, Sadece Ekleme Yapıldı) */
        .btn-main { width:100%; padding:18px; border-radius:20px; border:none; font-weight:900; margin-bottom:15px; cursor:pointer; text-transform:uppercase; transition:0.3s; }
        
        /* Slider (Ses Ayarı) */
        .slider { width: 100%; margin: 15px 0; accent-color: #39FF14; }

        /* Level Sayfası */
        #level-grid { display:grid; grid-template-columns: repeat(4, 1fr); gap:15px; padding:20px; width:100%; max-height:70vh; overflow-y:auto; }
        .lvl-box { aspect-ratio: 1; background:rgba(255,255,255,0.1); border-radius:15px; display:flex; align-items:center; justify-content:center; font-size:1.5rem; position:relative; border: 2px solid rgba(255,255,255,0.1); }
        .lvl-locked::after { content:'\f023'; font-family:'Font Awesome 5 Free'; font-weight:900; position:absolute; top:5px; right:5px; font-size:0.8rem; color:#ffcc00; }
    </style>
</head>
<body>

<div id="splash">
    <video id="splash-vid" autoplay muted playsinline>
        <source src="video.mp4" type="video/mp4">
    </video>
</div>

<div id="settings-trigger" class="settings-btn" onclick="toggleSettings()"><i class="fas fa-cog"></i></div>

<div id="settings-modal" class="modal">
    <div class="glass-card">
        <h2>AYARLAR</h2>
        <div style="margin-top:20px; text-align:left;">
            <label>Müzik Sesi</label>
            <input type="range" id="music-vol" class="slider" oninput="updateVol()">
            <label>Efekt Sesi</label>
            <input type="range" id="sfx-vol" class="slider" oninput="updateVol()">
        </div>
        <button class="btn-main" style="background:#39FF14; margin-top:20px;" onclick="toggleSettings()">KAPAT</button>
    </div>
</div>

<div id="profile-screen" class="container">
    <div class="glass-card">
        <div id="p-img-box" style="width:100px; height:100px; border-radius:50%; background:#333; margin:0 auto 15px; overflow:hidden; border:3px solid #39FF14;">
            <img id="p-img" src="default-avatar.png" style="width:100%; height:100%; object-fit:cover;">
        </div>
        <input type="file" id="img-input" style="display:none" onchange="uploadImg(this)">
        <button onclick="document.getElementById('img-input').click()" style="background:none; border:none; color:#39FF14; margin-bottom:10px; cursor:pointer;">RESİM SEÇ</button>
        <input type="text" id="uname" style="width:100%; padding:12px; border-radius:10px; margin-bottom:10px; text-align:center;" placeholder="ADINIZ">
        <button class="btn-main" style="background:#39FF14;" onclick="saveProfile()">KAYDET</button>
    </div>
</div>

<div id="mode-screen" class="container">
    <div class="glass-card" style="background:#111; border-color:#39FF14;">
        <h2 style="color:#39FF14">NORMAL MOD</h2>
        <button class="btn-main" style="background:#39FF14" onclick="showLevels()">OYNA</button>
    </div>

    <div class="glass-card" style="background:#111; border-color:#00d4ff;">
        <h2 style="color:#00d4ff">OTO EŞLEŞME</h2>
        <button class="btn-main" style="background:#00d4ff" onclick="autoMatch()">HIZLI BUL</button>
    </div>

    <div class="glass-card" style="background:#111; border-color:#ffcc00;">
        <h2 style="color:#ffcc00">1V1 ODA</h2>
        <button class="btn-main" style="background:#ffcc00" onclick="location.href='pvp.html'">ODA KUR/GİR</button>
    </div>
</div>

<div id="level-screen" class="container">
    <h2 style="margin-bottom:20px;">SEVİYELER</h2>
    <div id="level-grid"></div>
    <button class="btn-main" style="background:#ff4b2b; width:auto; padding:10px 40px;" onclick="showModes()">GERİ</button>
</div>

<audio id="bg-music" loop src="fon-muzigi.mp3"></audio>

<script>
    const vid = document.getElementById('splash-vid');
    const music = document.getElementById('bg-music');
    let user = JSON.parse(localStorage.getItem('wz_user'));

    // Splash Bitişi
    vid.onended = () => {
        document.getElementById('splash').style.display = 'none';
        music.play();
        if(user) showModes(); else document.getElementById('profile-screen').classList.add('active');
    };

    function saveProfile() {
        const name = document.getElementById('uname').value;
        if(!name) return alert("İsim yaz kanka!");
        user = { name: name, coins: 500, level: 1, img: document.getElementById('p-img').src };
        localStorage.setItem('wz_user', JSON.stringify(user));
        location.reload();
    }

    function showModes() {
        document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
        document.getElementById('mode-screen').classList.add('active');
        document.getElementById('settings-trigger').style.display = 'block';
    }

    function showLevels() {
        document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
        const grid = document.getElementById('level-grid');
        grid.innerHTML = "";
        for(let i=1; i<=16; i++) {
            const box = document.createElement('div');
            box.className = i <= user.level ? 'lvl-box' : 'lvl-box lvl-locked';
            box.innerText = i;
            if(i <= user.level) box.onclick = () => location.href = `game.html?lvl=${i}`;
            grid.appendChild(box);
        }
        document.getElementById('level-screen').classList.add('active');
    }

    function toggleSettings() {
        const modal = document.getElementById('settings-modal');
        modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
    }

    function updateVol() {
        music.volume = document.getElementById('music-vol').value / 100;
        localStorage.setItem('wz_vol', music.volume);
    }
</script>
</body>
</html>
