<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WordZen | Oyun</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { width:100%; height:100vh; overflow:hidden; font-family:'Montserrat', sans-serif; background-size:cover; background-position:center; transition:1s ease; }
        
        .top-bar { position:fixed; top:10px; width:100%; display:flex; justify-content:space-between; padding:10px 20px; z-index:100; }
        .pill { background:rgba(0,0,0,0.8); border:2px solid #39FF14; color:#fff; padding:8px 15px; border-radius:12px; font-size:0.9rem; }
        .coin-box { border-color:#ffcc00; color:#ffcc00; font-weight:900; }

        #game-area { height:60vh; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        #word-row { display:flex; gap:5px; margin-bottom:20px; }
        .box { width:45px; height:55px; background:rgba(255,255,255,0.1); border:2px solid #fff; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:1.8rem; color:#fff; text-transform:uppercase; }
        .clue-box { background:rgba(0,0,0,0.6); padding:15px; border-radius:15px; color:#fff; text-align:center; width:85%; }

        /* UZUN KLAVYE */
        #kb { position:fixed; bottom:0; width:100%; height:35vh; background:rgba(0,0,0,0.9); padding:5px; display:flex; flex-direction:column; gap:5px; }
        .row { display:flex; justify-content:center; gap:4px; flex:1; }
        .key { flex:1; background:rgba(255,255,255,0.15); border-radius:8px; color:#fff; display:flex; align-items:center; justify-content:center; font-size:1.3rem; font-weight:900; cursor:pointer; border-bottom:4px solid #000; }
        .key:active { background:#39FF14; color:#000; transform:translateY(2px); border-bottom:0; }
        .key-del { flex:1.5; background:#ff4b2b; }
        .key-hint { flex:1.5; background:#ffcc00; color:#000; }

        .coin-anim { position:absolute; color:#ffcc00; font-size:2rem; animation:fly 0.8s forwards; z-index:1000; pointer-events:none; }
        @keyframes fly { 0%{opacity:1; transform:translateY(0);} 100%{opacity:0; transform:translateY(-200px);} }
    </style>
</head>
<body id="game-body">

    <div class="top-bar">
        <div class="pill">BÖLÜM <span id="lvl-txt">1</span></div>
        <div class="pill coin-box">🪙 <span id="coin-txt">0</span></div>
    </div>

    <div id="game-area">
        <div id="word-row"></div>
        <div class="clue-box" id="clue-txt">...</div>
    </div>

    <div id="kb"></div>

<script type="module">
    import { wordList } from './kelimeler.js';
    let profile = JSON.parse(localStorage.getItem('wz_profile'));
    const dogruSes = new Audio('dogru.mp3');
    const yanlisSes = new Audio('yanlis.mp3');

    function render() {
        document.getElementById('lvl-txt').innerText = profile.level;
        document.getElementById('coin-txt').innerText = profile.coins;
        const data = wordList[(profile.level - 1) % wordList.length];
        document.getElementById('clue-txt').innerText = data.m;
        
        // 5 Bölümde bir BG değişimi (42 BG sınırı)
        let bgIndex = Math.floor((profile.level - 1) / 5) + 1;
        if(bgIndex > 42) bgIndex = 42;
        document.body.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)), url('bg${bgIndex}.jpg')`;

        const row = document.getElementById('word-row');
        row.innerHTML = "";
        data.a.split('').forEach(() => {
            const b = document.createElement('div'); b.className='box'; row.appendChild(b);
        });
    }

    // İpucu Düzeltme
    window.useHint = () => {
        if(profile.coins < 10) return alert("Yetersiz Jeton!");
        const data = wordList[(profile.level - 1) % wordList.length];
        const boxes = document.querySelectorAll('.box');
        for(let i=0; i<boxes.length; i++) {
            if(boxes[i].innerText === "") {
                boxes[i].innerText = data.a[i];
                boxes[i].style.color = "#39FF14";
                profile.coins -= 10;
                localStorage.setItem('wz_profile', JSON.stringify(profile));
                render(); checkWinStatus(); break;
            }
        }
    };

    function checkWinStatus() {
        const data = wordList[(profile.level - 1) % wordList.length];
        let current = ""; document.querySelectorAll('.box').forEach(b => current += b.innerText);
        if(current.length === data.a.length) {
            if(current === data.a) {
                dogruSes.play();
                profile.coins += 5;
                profile.level += 1;
                localStorage.setItem('wz_profile', JSON.stringify(profile));
                setTimeout(render, 500);
            } else {
                yanlisSes.play();
                document.querySelectorAll('.box').forEach(b => b.innerText = "");
            }
        }
    }

    // Klavye Oluşturma (Uzun)
    const keys = [["Q","W","E","R","T","Y","U","I","İ","O","P"],["A","S","D","F","G","Ğ","H","J","K","L","Ş"],["Z","X","C","V","B","N","M","Ö","Ç","Ü"]];
    const kb = document.getElementById('kb');
    keys.forEach((rowArr, i) => {
        const r = document.createElement('div'); r.className='row';
        rowArr.forEach(kChar => {
            const k = document.createElement('div'); k.className='key'; k.innerText=kChar;
            k.onclick = () => {
                const boxes = document.querySelectorAll('.box');
                for(let b of boxes) { if(b.innerText==="") { b.innerText=kChar; checkWinStatus(); break; } }
            };
            r.appendChild(k);
        });
        if(i===2) {
            const del = document.createElement('div'); del.className='key key-del'; del.innerText='SİL';
            del.onclick = () => {
                const boxes = document.querySelectorAll('.box');
                for(let j=boxes.length-1; j>=0; j--) { if(boxes[j].innerText!=="") { boxes[j].innerText=""; break; } }
            };
            r.appendChild(del);
            const hnt = document.createElement('div'); hnt.className='key key-hint'; hnt.innerText='İPUCU';
            hnt.onclick = useHint;
            r.appendChild(hnt);
        }
        kb.appendChild(r);
    });

    render();
</script>
</body>
</html>
