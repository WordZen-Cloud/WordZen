<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WordZen | Normal Mod</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        body { background:#000; color:#fff; font-family:'Montserrat'; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; }
        .card { background:rgba(255,255,255,0.05); padding:30px; border-radius:30px; width:90%; text-align:center; }
        .slot-cont { display:flex; gap:5px; justify-content:center; margin:20px; }
        .slot { width:40px; height:50px; border:1px solid #444; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:1.5rem; }
        input { position:absolute; opacity:0; }
        .btn { padding:15px 30px; background:#39FF14; color:#000; border:none; border-radius:15px; font-weight:900; margin-top:20px; }
    </style>
</head>
<body onclick="document.getElementById('tin').focus()">

    <div class="card">
        <h2 id="lvl">SEVİYE: 1</h2>
        <div class="slot-cont" id="slots"></div>
        <p id="hint">İpucu buraya gelecek...</p>
        <input type="text" id="tin">
        <button class="btn" onclick="location.href='index.html'">ÇIK</button>
    </div>

<script>
    const user = JSON.parse(localStorage.getItem('wz_user'));
    const wordList = [
        {a:"ELMA", m:"Kırmızı veya yeşil meyve."},
        {a:"ARABA", m:"Dört tekerlekli ulaşım aracı."},
        {a:"GÜNEŞ", m:"Dünyayı ısıtan yıldız."}
    ];
    let cur = 0;

    function load() {
        const q = wordList[cur];
        document.getElementById('lvl').innerText = "SEVİYE: " + (cur + 1);
        document.getElementById('hint').innerText = q.m;
        const sc = document.getElementById('slots'); sc.innerHTML = "";
        q.a.split('').forEach(() => { sc.innerHTML += `<div class="slot"></div>`; });
    }

    document.getElementById('tin').oninput = function() {
        const q = wordList[cur];
        const val = this.value.toUpperCase();
        const slots = document.querySelectorAll('.slot');
        q.a.split('').forEach((h, i) => { slots[i].innerText = val[i] || ""; });

        if(val === q.a) {
            cur++;
            this.value = "";
            if(cur < wordList.length) load();
            else alert("Tüm seviyeler bitti!");
        }
    };
    load();
</script>
</body>
</html>
