<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WordZen | Oyun</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { width:100%; height:100vh; overflow:hidden; font-family:sans-serif; background-size:cover; background-position:center; display:flex; flex-direction:column; transition:0.5s; }
        
        /* Seviyeler (Reels) Menüsü */
        #levels-reels { position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:5000; display:none; overflow-y:scroll; scroll-snap-type:y mandatory; }
        .lvl-page { height:100vh; scroll-snap-align:start; display:grid; grid-template-columns:repeat(2, 1fr); gap:15px; padding:100px 30px; }
        .lvl-box { background:#111; border:2px solid #333; border-radius:20px; display:flex; align-items:center; justify-content:center; font-size:2rem; color:#fff; position:relative; }
        .locked::after { content:'🔒'; position:absolute; top:5px; right:5px; font-size:1rem; }

        .top-bar { padding:20px; display:flex; justify-content:space-between; align-items:center; }
        .pill { background:rgba(0,0,0,0.8); border:2px solid #39FF14; color:#fff; padding:10px 20px; border-radius:15px; font-weight:900; }
        
        #hint-area { display:flex; justify-content:center; margin-bottom:10px; }
        .hint-btn { background:#ffcc00; color:#000; padding:10px 30px; border-radius:50px; font-weight:900; border:none; }

        /* Oyun Kutucukları */
        #game-content { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding-bottom:38vh; }
        #word-row { display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; justify-content:center; }
        .box { width:50px; height:60px; background:rgba(0,0,0,0.5); border:3px solid #fff; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:2rem; color:#fff; font-weight:900; transition:0.3s; }
        .correct { background:#39FF14 !important; border-color:#39FF14 !important; color:#000 !important; }
        .wrong { background:#ff4b2b !important; border-color:#ff4b2b !important; }

        /* UZUN KLAVYE */
        #kb { position:fixed; bottom:0; width:100%; height:38vh; background:rgba(0,0,0,0.95); padding:8px; display:flex; flex-direction:column; gap:5px; border-top:3px solid #39FF14; }
        .row { display:flex; gap:4px; flex:1; }
        .key { flex:1; background:#222; border-radius:8px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:1.4rem; font-weight:900; border-bottom:5px solid #000; }
        .key:active { background:#39FF14; color:#000; transform:translateY(3px); border-bottom:1px solid #000; }
    </style>
</head>
<body id="b">

<div id="levels-reels">
    <button onclick="document.getElementById('levels-reels').style.display='none'" style="position:fixed; top:20px; right:20px; background:red; color:#fff; padding:10px; border-radius:50%; z-index:6000;">X</button>
    <div id="lvl-grid"></div>
</div>

<div class="top-bar">
    <div class="pill" onclick="showLevels()">LEVELS</div>
    <div class="pill" style="border-color:#ffcc00; color:#ffcc00;">🪙 <span id="c">0</span></div>
</div>

<div id="hint-area"><button class="hint-btn" onclick="hint()">İPUCU (-10)</button></div>

<div id="game-content">
    <div id="word-row"></div>
    <div id="m" style="background:rgba(0,0,0,0.7); padding:15px; border-radius:15px; color:#fff; text-align:center; width:85%;"></div>
</div>

<div id="kb"></div>

<script type="module">
    import { wordList } from './kelimeler.js';
    let u = JSON.parse(localStorage.getItem('wz_user'));
    let cur = "";

    function render() {
        const d = wordList[(u.level-1)%wordList.length];
        document.getElementById('c').innerText = u.coins;
        document.getElementById('m').innerText = d.m;
        
        let bg = Math.floor((u.level-1)/5)+1;
        document.getElementById('b').style.backgroundImage = `linear-gradient(rgba(0,0,0,0.4),rgba(0,0,0,0.4)), url('bg${bg>42?42:bg}.jpg')`;

        const row = document.getElementById('word-row'); row.innerHTML = "";
        d.a.split('').forEach(() => { const b = document.createElement('div'); b.className='box'; row.appendChild(b); });
        cur = "";
    }

    window.hint = () => {
        if(u.coins < 10) return;
        const d = wordList[(u.level-1)%wordList.length];
        const boxes = document.querySelectorAll('.box');
        for(let i=0; i<boxes.length; i++) {
            if(boxes[i].innerText === "") {
                boxes[i].innerText = d.a[i];
                u.coins -= 10; save(); renderStats(); check(); break;
            }
        }
    };

    function check() {
        const d = wordList[(u.level-1)%wordList.length];
        const boxes = document.querySelectorAll('.box');
        let val = ""; boxes.forEach(b => val += b.innerText);
        
        if(val.length === d.a.length) {
            if(val === d.a) {
                boxes.forEach(b => b.classList.add('correct'));
                new Audio('dogru.mp3').play();
                u.coins += 5; u.level++; save();
                setTimeout(render, 800);
            } else {
                boxes.forEach(b => b.classList.add('wrong'));
                new Audio('yanlis.mp3').play();
                setTimeout(() => { boxes.forEach(b => {b.innerText=""; b.classList.remove('wrong')}); }, 500);
            }
        }
    }

    // Klavye
    const keys = [["Q","W","E","R","T","Y","U","I","İ","O","P"],["A","S","D","F","G","Ğ","H","J","K","L","Ş"],["Z","X","C","V","B","N","M","Ö","Ç","Ü","SİL"]];
    const kb = document.getElementById('kb');
    keys.forEach(r => {
        const d = document.createElement('div'); d.className='row';
        r.forEach(k => {
            const b = document.createElement('div'); b.className='key'; b.innerText=k;
            if(k === "SİL") b.style.background = "#ff4b2b";
            b.onclick = () => {
                const boxes = document.querySelectorAll('.box');
                if(k === "SİL") {
                    for(let i=boxes.length-1; i>=0; i--) if(boxes[i].innerText!=="") { boxes[i].innerText=""; break; }
                } else {
                    for(let i=0; i<boxes.length; i++) if(boxes[i].innerText==="") { boxes[i].innerText=k; check(); break; }
                }
            };
            d.appendChild(b);
        });
        kb.appendChild(d);
    });

    window.showLevels = () => {
        const g = document.getElementById('lvl-grid'); g.innerHTML = "";
        let page;
        for(let i=1; i<=100; i++) {
            if((i-1)%6 === 0) { page = document.createElement('div'); page.className='lvl-page'; g.appendChild(page); }
            const b = document.createElement('div'); b.className = 'lvl-box' + (i > u.level ? ' locked' : '');
            b.innerText = i;
            if(i <= u.level) b.onclick = () => { u.level = i; save(); location.reload(); };
            page.appendChild(b);
        }
        document.getElementById('levels-reels').style.display = 'block';
    }

    function save() { localStorage.setItem('wz_user', JSON.stringify(u)); }
    function renderStats() { document.getElementById('c').innerText = u.coins; }
    render();
</script>
</body>
</html>
