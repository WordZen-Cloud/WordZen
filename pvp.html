<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WordZen | Arena</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { background:#000; color:#fff; font-family:'Montserrat', sans-serif; overflow:hidden; }
        
        /* Arka Plan Düzenlemesi - Daha Premium */
        .bg-premium { background: radial-gradient(circle at center, #0f0c29 0%, #302b63 50%, #000000 100%); }
        .wz-panel { display:none; height:100vh; width:100%; flex-direction:column; align-items:center; justify-content:center; position:fixed; top:0; left:0; z-index: 10; }
        .active { display:flex !important; }

        .glass-card { 
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); 
            border: 1px solid rgba(255, 255, 255, 0.1); padding: 40px; 
            border-radius: 40px; width: 90%; max-width: 400px; text-align: center; 
        }
        .m-in { width:100%; padding:18px; margin:10px 0; border-radius:20px; background:rgba(0,0,0,0.6); border:1px solid #444; color:#fff; text-align:center; font-weight:800; font-size:1.2rem; outline:none; }
        .btn-panel { width:100%; padding:20px; border-radius:20px; border:none; font-weight:900; cursor:pointer; margin-top:10px; text-transform:uppercase; font-size:1.1rem; transition: 0.3s; }

        /* Zaman barı tamamen kaldırıldı */
        #t-bar-cont { display: none !important; }

        #arena { background: #000; justify-content: flex-start; padding-top: 30px; display:none; flex-direction:column; align-items:center; height:100vh; }
        #start-timer { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:12rem; color:#39FF14; text-shadow:0 0 50px #39FF14; z-index:200; display:none; }

        .p-heads { display:flex; justify-content:space-between; padding:30px 25px; width:100%; }
        .p-sc { font-size:3.5rem; font-weight:900; }
        
        #word-row { display:flex; gap:12px; margin-top: 20px; margin-bottom:20px; justify-content:center; flex-wrap:wrap; width:95%; }
        .slot { width:55px; height:70px; border:3px solid rgba(255,255,255,0.2); border-radius:15px; display:flex; align-items:center; justify-content:center; font-size:2rem; background:rgba(255,255,255,0.05); font-weight:900; color: #fff; }
        
        #cl-box { background:rgba(255,255,255,0.05); padding:25px; border-radius:25px; text-align:center; width:90%; border:1px solid #222; font-size:1.2rem; min-height: 80px; line-height: 1.4; }

        #k-in { position:absolute; top:-1000px; opacity:0; }

        /* Kazanan/Kaybeden Resimleri İçin Arka Plan Sifirlama */
        #res-img { width:85%; max-width:300px; margin-bottom:15px; filter: drop-shadow(0 0 20px rgba(255,255,255,0.2)); mix-blend-mode: screen; background: none !important; border: none !important; }
        
        #loading-circle { border: 6px solid #222; border-top: 6px solid #39FF14; border-radius: 50%; width: 60px; height: 60px; animation: spin 1s linear infinite; margin: 25px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body onclick="document.getElementById('k-in').focus()">

    <div id="matchmaking-screen" class="wz-panel active bg-premium">
        <div class="glass-card" id="ui-setup">
            <h2 style="color:#00d4ff; margin-bottom:20px;">ODA KUR</h2>
            <input type="number" id="bet-amount" class="m-in" placeholder="Miktar Girin">
            <button class="btn-panel" style="background:#00d4ff; color:#000;" onclick="createRoom()">ODA OLUŞTUR</button>
            <div style="margin:20px; color:#444;">-- VEYA --</div>
            <input type="number" id="room-code-in" class="m-in" placeholder="KOD GİRİN">
            <button class="btn-panel" style="background:#39FF14; color:#000;" onclick="joinRoom()">ODAYA KATIL</button>
        </div>

        <div class="glass-card" id="ui-wait" style="display:none;">
            <h2 style="color:#39FF14;">ODA HAZIR!</h2>
            <h1 id="room-code-display" style="color:#ffcc00; font-size:3rem; margin:15px 0;">000000</h1>
            <p style="color:#aaa;">Kızın girmesi bekleniyor...</p>
            <div id="loading-circle"></div>
            <button class="btn-panel" style="background:#ff4b2b; color:#fff; margin-top:20px;" onclick="location.reload()">İPTAL ET</button>
        </div>
    </div>

    <div id="arena">
        <div id="start-timer">5</div>
        <div class="p-heads">
            <div style="text-align:center;"><div class="p-sc" id="p1-s" style="color:#39FF14;">0</div><div style="color:#39FF14; font-size:0.8rem;" id="p1-n">MUHAMMED</div></div>
            <div style="font-size:2rem; color:#ff4b2b; align-self:center;">VS</div>
            <div style="text-align:center;"><div class="p-sc" id="p2-s" style="color:#ff4b2b;">0</div><div style="color:#ff4b2b; font-size:0.8rem;" id="p2-n">KIZ</div></div>
        </div>
        <div id="word-row"></div>
        <div id="cl-box">Soru Yükleniyor...</div>
        <input type="text" id="k-in" autocorrect="off" autocapitalize="on" spellcheck="false">
    </div>

    <div id="end-screen" class="wz-panel">
        <img id="res-img" src="">
        <h1 id="res-msg" style="font-size:3.5rem;">KAZANDIN!</h1>
        <button class="btn-panel" style="background:#39FF14; color:#000; width:80%; margin-top:30px;" onclick="location.reload()">ANA MENÜ</button>
    </div>

<audio id="bg-m" loop src="fon-muzigi.mp3"></audio>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-database.js";
    import { wordList } from './kelimeler.js';

    const firebaseConfig = { databaseURL: "https://wordzen-2e052-default-rtdb.firebaseio.com" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let u = JSON.parse(localStorage.getItem('wz_user')) || {name:"Muhammed"};
    let rID, mRole, gData, preTimer;

    const sndDogru = new Audio('dogru.mp3');
    const sndYanlis = new Audio('yanlis.mp3');

    window.createRoom = () => {
        const bet = document.getElementById('bet-amount').value || 0;
        rID = Math.floor(100000 + Math.random() * 900000).toString();
        set(ref(db, 'rooms/' + rID), {
            id: rID, bet: bet, qIdx: 0, status: 'wait',
            p1: { name: u.name, score: 0 }, p2: null, words: wordList
        }).then(() => { 
            mRole = 'p1'; listen(); 
            document.getElementById('ui-setup').style.display='none'; 
            document.getElementById('ui-wait').style.display='block'; 
            document.getElementById('room-code-display').innerText = rID; 
        });
    };

    window.joinRoom = () => {
        const code = document.getElementById('room-code-in').value;
        onValue(ref(db, 'rooms/' + code), (s) => {
            const d = s.val();
            if(!d || d.p2) return alert("Oda bulunamadı!");
            update(ref(db, 'rooms/' + code), { p2: { name: u.name, score: 0 }, status: 'play' });
            rID = code; mRole = 'p2'; listen();
        }, {onlyOnce: true});
    };

    function listen() {
        onValue(ref(db, 'rooms/' + rID), (s) => {
            gData = s.val();
            if(!gData) return;
            if(gData.status === 'play') { 
                document.getElementById('matchmaking-screen').classList.remove('active'); 
                document.getElementById('arena').style.display='flex'; 
                startPreTimer(); 
            }
            if(gData.status === 'end') showResults();
        });
    }

    function startPreTimer() {
        if(preTimer) return;
        let count = 5;
        const st = document.getElementById('start-timer');
        st.style.display = 'block';
        document.getElementById('bg-m').play();
        preTimer = setInterval(() => {
            count--; st.innerText = count;
            if(count <= 0) { clearInterval(preTimer); st.style.display='none'; renderRound(); }
        }, 1000);
    }

    function renderRound() {
        const q = gData.words[gData.qIdx];
        document.getElementById('p1-n').innerText = gData.p1.name;
        document.getElementById('p2-n').innerText = gData.p2.name;
        document.getElementById('p1-s').innerText = gData.p1.score;
        document.getElementById('p2-s').innerText = gData.p2.score;
        document.getElementById('cl-box').innerText = q.m;
        const row = document.getElementById('word-row'); row.innerHTML = "";
        q.a.split('').forEach(() => { row.innerHTML += `<div class="slot"></div>`; });
        document.getElementById('k-in').focus();
    }

    document.getElementById('k-in').oninput = function() {
        const q = gData.words[gData.qIdx];
        const val = this.value.toUpperCase();
        const slots = document.querySelectorAll('.slot');
        q.a.split('').forEach((h, i) => { if(slots[i]) slots[i].innerText = val[i] || ""; });

        if(val.length >= q.a.length) {
            if(val === q.a) {
                sndDogru.play();
                update(ref(db, `rooms/${rID}/${mRole}`), { score: gData[mRole].score + 1 });
                this.value = "";
                if(gData.qIdx < 9) update(ref(db, 'rooms/'+rID), { qIdx: gData.qIdx + 1 });
                else update(ref(db, 'rooms/'+rID), { status: 'end' });
            } else {
                sndYanlis.play();
                this.value = "";
                q.a.split('').forEach((h, i) => { if(slots[i]) slots[i].innerText = ""; });
            }
        }
    };

    function showResults() {
        document.getElementById('arena').style.display='none';
        document.getElementById('end-screen').classList.add('active');
        document.getElementById('bg-m').pause();
        const myScore = gData[mRole].score;
        const opScore = gData[mRole === 'p1' ? 'p2' : 'p1'].score;
        
        if(myScore > opScore) { 
            new Audio('winner.mp3').play(); 
            document.getElementById('res-img').src='winner.jpg'; 
            document.getElementById('res-msg').innerText="KAZANDIN!"; 
        } else { 
            new Audio('lose.mp3').play(); 
            document.getElementById('res-img').src='lose.jpg'; 
            document.getElementById('res-msg').innerText="KAYBETTİN!"; 
        }
    }
</script>
</body>
</html>
