<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WordZen | 1V1 Arena</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { width:100%; height:100vh; overflow:hidden; font-family:'Montserrat', sans-serif; background:#000; color:#fff; }
        
        /* 1. Eşleşme Ekranı (Matchmaking - Harika Arka Plan) */
        #matchmaking { 
            position:fixed; top:0; left:0; width:100%; height:100%; 
            background: linear-gradient(45deg, #0f0c29, #302b63, #24243e);
            display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:5000; padding:20px;
        }
        .match-card { background:rgba(255,255,255,0.05); backdrop-filter:blur(15px); padding:30px; border-radius:30px; border:1px solid rgba(255,255,255,0.1); width:100%; max-width:400px; text-align:center; }
        .match-input { width:100%; padding:15px; border-radius:15px; border:2px solid #39FF14; background:rgba(0,0,0,0.5); color:#39FF14; font-size:1.4rem; text-align:center; margin:10px 0; outline:none; }
        
        /* Eşleşme Aranıyor Animasyonu */
        .searching-anim { width:60px; height:60px; border:5px solid #39FF14; border-top-color:transparent; border-radius:50%; animation:spin 1s linear infinite; margin:20px auto; display:none; }
        @keyframes spin { 100% { transform:rotate(360deg); } }

        /* 2. Oyun Arenası Arka Planı */
        #arena { 
            display:none; height:100vh; flex-direction:column; 
            background: url('bg-arena.jpg') center/cover no-repeat; /* Buraya güzel bir arena resmi koy kanka */
            background-color: #000;
        }
        
        /* Zaman Barı (Kırmızıdan Yeşile) */
        #timer-container { width:100%; height:10px; background:#222; position:fixed; top:0; }
        #timer-bar { width:100%; height:100%; background:linear-gradient(to right, #ff4b2b, #39FF14); transition: width 0.1s linear; }

        .players { display:flex; justify-content:space-between; padding:40px 20px 20px; background:linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); }
        .score-box { text-align:center; }
        .score-val { font-size:2.5rem; color:#39FF14; text-shadow:0 0 10px #39FF14; }

        #q-area { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; }
        #word-slots { display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; justify-content:center; }
        .slot { width:45px; height:55px; border:3px solid #fff; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:1.8rem; background:rgba(0,0,0,0.5); transition:0.3s; }
        .correct { background:#39FF14 !important; border-color:#39FF14 !important; color:#000; }

        /* UZUN KLAVYE (Burada da var artık!) */
        #kb { height:38vh; background:rgba(0,0,0,0.95); padding:8px; display:flex; flex-direction:column; gap:5px; border-top:3px solid #00d4ff; }
        .row { display:flex; gap:4px; flex:1; }
        .key { flex:1; background:#222; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:1.3rem; font-weight:900; border-bottom:4px solid #000; }
        .key:active { background:#00d4ff; color:#000; transform:translateY(3px); }
        .key-del { flex:1.5; background:#ff4b2b; }

        .btn { width:100%; padding:18px; border-radius:15px; border:none; font-weight:900; font-size:1.1rem; cursor:pointer; margin-top:10px; }
    </style>
</head>
<body>

    <div id="matchmaking">
        <div class="match-card">
            <h2 style="color:#39FF14; margin-bottom:20px;">1V1 KAPIŞMA</h2>
            <div id="setup-mode">
                <input type="number" id="bet-val" class="match-input" placeholder="BAHİS JETON">
                <button class="btn" style="background:#39FF14; color:#000;" onclick="createRoom()">ODA KUR</button>
                <div style="margin:15px 0; color:#888;">VEYA</div>
                <input type="text" id="room-id-in" class="match-input" placeholder="WZ-XXXXXX">
                <button class="btn" style="background:#00d4ff; color:#000;" onclick="joinRoom()">ODAYA GİR</button>
            </div>
            
            <div id="waiting-mode" style="display:none;">
                <h3 id="display-room-id" style="color:#ffcc00; font-size:1.8rem;">WZ-000000</h3>
                <p style="margin-top:10px;">Rakip Bekleniyor...</p>
                <div class="searching-anim" style="display:block;"></div>
                <button class="btn" style="background:red; color:#fff;" onclick="location.reload()">İPTAL</button>
            </div>
        </div>
    </div>

    <div id="arena">
        <div id="timer-container"><div id="timer-bar"></div></div>
        <div class="players">
            <div class="score-box"><p id="p1-n">SEN</p><div class="score-val" id="p1-s">0</div></div>
            <div style="font-size:1.5rem; color:#ff4b2b; padding-top:15px;">VS</div>
            <div class="score-box"><p id="p2-n">RAKİP</p><div class="score-val" id="p2-s">0</div></div>
        </div>
        <div id="q-area">
            <div id="word-slots"></div>
            <div id="clue-txt" style="background:rgba(0,0,0,0.8); padding:15px; border-radius:15px; text-align:center; width:90%; border:1px solid #333;">...</div>
        </div>
        <div id="kb"></div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-database.js";
    import { wordList } from './kelimeler.js';

    // Firebase Bilgilerin (Kendi bilgilerini buraya çak kanka)
    const app = initializeApp({ databaseURL: "https://wordzen-2e052-default-rtdb.firebaseio.com" });
    const db = getDatabase(app);
    let u = JSON.parse(localStorage.getItem('wz_user'));
    let myRole, roomID, gameData, timerInt;

    // 1. ODA KURMA
    window.createRoom = () => {
        const bet = parseInt(document.getElementById('bet-val').value);
        if(!bet || u.coins < bet) return alert("Jetonun yetmiyor kanka!");
        
        roomID = "WZ-" + Math.floor(100000 + Math.random() * 900000);
        const qList = [];
        for(let i=0; i<10; i++) qList.push(wordList[Math.floor(Math.random()*wordList.length)]);

        const rRef = ref(db, 'rooms/' + roomID);
        set(rRef, {
            id: roomID, bet: bet, qIdx: 0, status: 'wait',
            p1: { name: u.name, score: 0 }, p2: null, words: qList
        });

        myRole = 'p1';
        document.getElementById('setup-mode').style.display = 'none';
        document.getElementById('waiting-mode').style.display = 'block';
        document.getElementById('display-room-id').innerText = roomID;
        listen();
    };

    // 2. ODAYA GİRİŞ
    window.joinRoom = () => {
        const rid = document.getElementById('room-id-in').value.toUpperCase();
        onValue(ref(db, 'rooms/' + rid), (s) => {
            const d = s.val();
            if(!d || d.p2) return alert("Oda bulunamadı veya dolu!");
            if(u.coins < d.bet) return alert("Bahis için jetonun eksik!");

            update(ref(db, 'rooms/' + rid), {
                p2: { name: u.name, score: 0 },
                status: 'play',
                startTime: Date.now()
            });
            myRole = 'p2';
            roomID = rid;
            listen();
        }, { onlyOnce: true });
    };

    function listen() {
        onValue(ref(db, 'rooms/' + roomID), (s) => {
            gameData = s.val();
            if(gameData.status === 'play') {
                document.getElementById('matchmaking').style.display = 'none';
                document.getElementById('arena').style.display = 'flex';
                startRound();
            }
        });
    }

    function startRound() {
        const q = gameData.words[gameData.qIdx];
        document.getElementById('p1-n').innerText = gameData.p1.name;
        document.getElementById('p2-n').innerText = gameData.p2.name;
        document.getElementById('p1-s').innerText = gameData.p1.score;
        document.getElementById('p2-s').innerText = gameData.p2.score;
        document.getElementById('clue-txt').innerText = q.m;

        const slots = document.getElementById('word-slots'); slots.innerHTML = "";
        q.a.split('').forEach(() => { const div = document.createElement('div'); div.className='slot'; slots.appendChild(div); });
        
        // 15 Saniye Geri Sayım
        let timeLeft = 100;
        clearInterval(timerInt);
        timerInt = setInterval(() => {
            timeLeft -= 0.66; // Yaklaşık 15 saniye
            document.getElementById('timer-bar').style.width = timeLeft + "%";
            if(timeLeft <= 0) {
                clearInterval(timerInt);
                if(myRole === 'p1') {
                    if(gameData.qIdx < 9) update(ref(db, 'rooms/'+roomID), { qIdx: gameData.qIdx + 1 });
                    else alert("Oyun Bitti!");
                }
            }
        }, 100);
    }

    // Klavye ve Kontrol (PVP için)
    const rows = [["Q","W","E","R","T","Y","U","I","İ","O","P"],["A","S","D","F","G","Ğ","H","J","K","L","Ş"],["Z","X","C","V","B","N","M","Ö","Ç","Ü","SİL"]];
    const kb = document.getElementById('kb');
    rows.forEach(r => {
        const div = document.createElement('div'); div.className='row';
        r.forEach(k => {
            const b = document.createElement('div'); b.className='key'; b.innerText=k;
            b.onclick = () => {
                const slots = document.querySelectorAll('.slot');
                if(k === "SİL") {
                    for(let i=slots.length-1; i>=0; i--) if(slots[i].innerText!=="") { slots[i].innerText=""; break; }
                } else {
                    for(let i=0; i<slots.length; i++) {
                        if(slots[i].innerText==="") { 
                            slots[i].innerText=k; 
                            // Kelime doldu mu bak
                            let res = ""; document.querySelectorAll('.slot').forEach(s => res += s.innerText);
                            if(res === gameData.words[gameData.qIdx].a) {
                                update(ref(db, `rooms/${roomID}/${myRole}`), { score: gameData[myRole].score + 1 });
                                if(gameData.qIdx < 9) update(ref(db, 'rooms/'+roomID), { qIdx: gameData.qIdx + 1 });
                            }
                            break; 
                        }
                    }
                }
            };
            div.appendChild(b);
        });
        kb.appendChild(div);
    });
</script>
</body>
</html>
