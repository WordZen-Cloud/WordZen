<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WordZen Arena 1v1 PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { background:#000; color:#fff; font-family:'Montserrat', sans-serif; overflow:hidden; }
        
        /* 1. SPLASH VIDEO */
        #splash { position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:10000; display:flex; align-items:center; justify-content:center; }
        #splash video { width:100%; height:100%; object-fit:cover; pointer-events: none; }

        /* PANELLER */
        .wz-panel { display:none; height:100vh; width:100%; flex-direction:column; align-items:center; justify-content:center; position:fixed; top:0; left:0; z-index:500; background:rgba(0,0,0,0.9); }
        .active { display:flex !important; }

        /* ARKA PLANLAR */
        #bg-layer { position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1; background-size:cover; background-position:center; transition: background-image 0.5s ease; }

        /* KART VE BUTONLAR */
        .glass-card { background:rgba(25,25,25,0.98); border:2px solid #444; padding:30px; border-radius:30px; width:90%; max-width:400px; text-align:center; position: relative; z-index: 600; }
        input, select { width:100%; padding:15px; margin:10px 0; border-radius:15px; background:#111; border:1px solid #555; color:#fff; text-align:center; font-weight:bold; font-size:1rem; }
        
        .btn { width:100%; padding:20px; border-radius:20px; border:none; font-weight:900; cursor:pointer; margin-top:12px; text-transform:uppercase; font-size:1.1rem; display: block; position: relative; z-index: 700; }
        .btn:active { transform: scale(0.95); opacity: 0.8; }

        /* JETON BAR */
        #coin-bar { position:fixed; top:15px; right:15px; background:rgba(0,0,0,0.85); padding:10px 20px; border-radius:25px; border:2px solid #ffcc00; z-index:1000; font-size:1.2rem; color:#ffcc00; font-weight:bold; }
        
        /* ARENA */
        #arena { display:none; flex-direction:column; align-items:center; height:100vh; padding-top:40px; z-index: 800; }
        #time-container { width:100%; height:12px; background:#222; position:fixed; top:0; left:0; z-index: 900; }
        #time-bar { width:100%; height:100%; background:linear-gradient(90deg, #ff4b2b, #ffcc00); transition: width 0.1s linear; }

        #q-text { background:rgba(0,0,0,0.85); padding:20px; border-radius:20px; margin:20px; text-align:center; width:92%; border:1px solid #00d4ff; font-size:1.2rem; line-height:1.4; }
        #word-row { display:flex; gap:8px; margin:25px 0; flex-wrap:wrap; justify-content:center; }
        .slot { width:48px; height:65px; border:2px solid #00d4ff; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:2rem; background:rgba(0,0,0,0.7); color:#fff; text-shadow: 0 0 5px #00d4ff; }

        /* KLAVYE INPUT */
        #k-in { position:fixed; bottom:25px; width:90%; left:5%; height:70px; background:#111; border:3px solid #00d4ff; color:#fff; border-radius:20px; text-align:center; font-size:2rem; font-weight:900; z-index: 1000; }
    </style>
</head>
<body>

    <div id="splash">
        <video id="intro-vid" muted playsinline autoplay>
            <source src="video.mp4" type="video/mp4">
        </video>
    </div>

    <div id="bg-layer"></div>
    <div id="coin-bar">💰 <span id="u-coins">0</span></div>

    <div id="reg-screen" class="wz-panel">
        <div class="glass-card">
            <h2 style="margin-bottom:15px; letter-spacing:2px;">ARENA KAYIT</h2>
            <input type="text" id="reg-name" placeholder="KULLANICI ADI">
            <input type="number" id="reg-age" placeholder="YAŞ">
            <select id="reg-gen">
                <option value="Erkek">ERKEK</option>
                <option value="Kadın">KADIN</option>
            </select>
            <button class="btn" style="background:#39FF14; color:#000;" onclick="saveProfile()">PROFİLİ OLUŞTUR</button>
        </div>
    </div>

    <div id="mode-screen" class="wz-panel">
        <div class="glass-card">
            <h2 style="color:#00d4ff; margin-bottom:20px;">OYUN MODU SEÇ</h2>
            <button class="btn" style="background:#fff; color:#000;" onclick="startNormal()">NORMAL MOD</button>
            <button class="btn" style="background:#00d4ff; color:#000;" onclick="showPanel('lobby-screen')">1V1 ÖZEL ODA</button>
            <button class="btn" style="background:#ffcc00; color:#000;" onclick="startRandom()">1V1 RANDOM</button>
        </div>
    </div>

    <div id="lobby-screen" class="wz-panel">
        <div class="glass-card">
            <h2>1V1 ODA AYARI</h2>
            <input type="number" id="bet-val" placeholder="BAHİS JETON (Min 100)">
            <button class="btn" style="background:#00d4ff; color:#000;" onclick="createRoom()">ODA KUR VE BEKLE</button>
            <div style="margin:15px; opacity:0.4; font-weight:bold;">- VEYA -</div>
            <input type="text" id="room-code-in" placeholder="KODU YAPIŞTIR (WZ-...)">
            <button class="btn" style="background:#fff; color:#000;" onclick="joinRoom()">ODAYA KATIL</button>
            <button class="btn" style="background:none; color:#ff4b2b; border:1px solid #ff4b2b;" onclick="showPanel('mode-screen')">VAZGEÇ</button>
        </div>
    </div>

    <div id="arena" class="wz-panel" style="background:none;">
        <div id="time-container"><div id="time-bar"></div></div>
        <div style="display:flex; justify-content:space-between; width:92%; margin-top:10px; font-weight:900; background:rgba(0,0,0,0.5); padding:10px; border-radius:15px;">
            <div id="p1-info" style="color:#00d4ff;">SEN: 0</div>
            <div id="p2-info" style="color:#ff4b2b;">RAKİP: 0</div>
        </div>
        <div id="q-text">Soru Yükleniyor...</div>
        <div id="word-row"></div>
        <button id="hint-btn" onclick="useHint()" style="background:#ffcc00; padding:12px 25px; border-radius:15px; border:none; font-weight:900; margin-top:10px; color:#000;">İPUCU (-50💰)</button>
        <input type="text" id="k-in" autocorrect="off" autocapitalize="on" spellcheck="false" placeholder="YAZMAYA BAŞLA">
    </div>

    <audio id="bg-music" loop src="fon-muzigi.mp3"></audio>
    <audio id="snd-true" src="dogru.mp3"></audio>
    <audio id="snd-false" src="yanlis.mp3"></audio>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, remove } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-database.js";
    import { wordList } from './kelimeler.js';

    const firebaseConfig = { databaseURL: "https://wordzen-2e052-default-rtdb.firebaseio.com" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let user = JSON.parse(localStorage.getItem('wz_pro_user')) || null;
    let currentRoom = null;
    let bgIdx = 1;
    let timerInt;

    // --- BUTON ÇALIŞMAMA SORUNU ÇÖZÜMÜ ---
    const v = document.getElementById('intro-vid');
    v.onended = () => {
        document.getElementById('splash').style.display = 'none';
        document.getElementById('bg-music').play();
        if(!user) showPanel('reg-screen'); 
        else { updateUI(); showPanel('mode-screen'); }
    };

    // Alternatif olarak video bitmezse diye (garantiye alalım)
    setTimeout(() => {
        if(document.getElementById('splash').style.display !== 'none') {
            document.getElementById('splash').style.display = 'none';
            if(!user) showPanel('reg-screen'); else showPanel('mode-screen');
        }
    }, 6000); 

    window.saveProfile = () => {
        const n = document.getElementById('reg-name').value;
        const a = document.getElementById('reg-age').value;
        if(!n || !a) return alert("Adını ve Yaşını yaz kanka!");
        user = { name: n, age: a, gender: document.getElementById('reg-gen').value, coins: 500, lv: 1 }; // Başlangıç 500 yaptık
        localStorage.setItem('wz_pro_user', JSON.stringify(user));
        updateUI(); showPanel('mode-screen');
    };

    window.showPanel = (id) => {
        document.querySelectorAll('.wz-panel').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'arena') document.getElementById('k-in').focus();
    };

    function updateUI() { 
        document.getElementById('u-coins').innerText = user.coins; 
    }

    // --- 1V1 ÖZEL ODA MANTIĞI ---
    window.createRoom = () => {
        const bet = parseInt(document.getElementById('bet-val').value);
        if(!bet || bet < 100) return alert("Minimum 100 jeton bahse girilir!");
        if(user.coins < bet) return alert("Bakiyen yetersiz!");
        
        const rID = "WZ-" + Math.floor(100000 + Math.random() * 900000);
        const randomWords = wordList.sort(() => 0.5 - Math.random()).slice(0, 10);
        
        set(ref(db, 'rooms/' + rID), {
            id: rID, bet: bet, qIdx: 0, status: 'wait',
            p1: { name: user.name, score: 0 },
            p2: null, words: randomWords, timeLeft: 15
        }).then(() => {
            currentRoom = rID;
            user.coins -= bet; 
            localStorage.setItem('wz_pro_user', JSON.stringify(user)); 
            updateUI();
            alert("ODA KODUN: " + rID + "\nKopyala ve arkadaşına at!");
            listenRoom(rID);
        });
    };

    window.joinRoom = () => {
        const rID = document.getElementById('room-code-in').value.toUpperCase();
        if(!rID) return alert("Kod yaz!");
        onValue(ref(db, 'rooms/' + rID), (s) => {
            const d = s.val();
            if(!d) return alert("Oda bulunamadı!");
            if(d.p2) return alert("Oda dolu!");
            if(user.coins < d.bet) return alert("Jetonun yetmiyor!");
            
            update(ref(db, 'rooms/' + rID), { 
                p2: { name: user.name, score: 0 },
                status: 'play' 
            });
            user.coins -= d.bet; 
            localStorage.setItem('wz_pro_user', JSON.stringify(user)); 
            updateUI();
            currentRoom = rID;
            listenRoom(rID);
        }, {onlyOnce: true});
    };

    function listenRoom(rID) {
        onValue(ref(db, 'rooms/' + rID), (s) => {
            const d = s.val(); if(!d) return;
            if(d.status === 'play') {
                showPanel('arena');
                renderGame(d);
            }
            if(d.status === 'end') finishGame(d);
        });
    }

    function renderGame(d) {
        const q = d.words[d.qIdx];
        document.getElementById('q-text').innerText = q.m;
        document.getElementById('p1-info').innerText = `P1 (${d.p1.name}): ${d.p1.score}`;
        document.getElementById('p2-info').innerText = `P2 (${d.p2 ? d.p2.name : '...'}): ${d.p2 ? d.p2.score : 0}`;
        
        const row = document.getElementById('word-row'); row.innerHTML = "";
        q.a.split('').forEach(() => row.innerHTML += `<div class="slot"></div>`);

        // Arka Plan Kasmasız Değişim
        if(d.qIdx % 5 === 0) {
            document.getElementById('bg-layer').style.backgroundImage = `url('bg${bgIdx}.jpg')`;
            bgIdx = (bgIdx % 42) + 1;
        }

        startTimer(d);
    }

    function startTimer(d) {
        let t = 15;
        const bar = document.getElementById('time-bar');
        clearInterval(timerInt);
        timerInt = setInterval(() => {
            t -= 0.1;
            bar.style.width = (t / 15) * 100 + "%";
            if(t <= 0) {
                clearInterval(timerInt);
                nextQuestion(d);
            }
        }, 100);
    }

    document.getElementById('k-in').oninput = function() {
        const val = this.value.toUpperCase();
        onValue(ref(db, 'rooms/' + currentRoom), (s) => {
            const d = s.val(); if(!d || d.status !== 'play') return;
            const q = d.words[d.qIdx];
            const slots = document.querySelectorAll('.slot');
            q.a.split('').forEach((h, i) => { if(slots[i]) slots[i].innerText = val[i] || ""; });

            if(val === q.a) {
                document.getElementById('snd-true').play();
                this.value = "";
                const role = (d.p1.name === user.name) ? 'p1' : 'p2';
                update(ref(db, `rooms/${currentRoom}/${role}`), { score: d[role].score + 1 });
                nextQuestion(d);
            } else if(val.length >= q.a.length) {
                document.getElementById('snd-false').play();
                this.value = "";
            }
        }, {onlyOnce: true});
    };

    function nextQuestion(d) {
        if(d.qIdx < 9) {
            update(ref(db, 'rooms/' + currentRoom), { qIdx: d.qIdx + 1 });
        } else {
            update(ref(db, 'rooms/' + currentRoom), { status: 'end' });
        }
    }

    function finishGame(d) {
        clearInterval(timerInt);
        const isP1 = (d.p1.name === user.name);
        const myScore = isP1 ? d.p1.score : d.p2.score;
        const oppScore = isP1 ? d.p2.score : d.p1.score;
        const total = d.bet * 2;

        if(myScore > oppScore) {
            user.coins += total;
            alert("ŞAMPİYON! " + total + " jeton aldın.");
        } else if(myScore < oppScore) {
            alert("KAYBETTİN! Jetonlar rakibe gitti.");
        } else {
            user.coins += d.bet;
            alert("BERABERE! Jetonlar iade edildi.");
        }
        localStorage.setItem('wz_pro_user', JSON.stringify(user));
        location.reload();
    }

    window.useHint = () => {
        if(user.coins < 50) return alert("Jetonun yok!");
        user.coins -= 50; updateUI();
        onValue(ref(db, 'rooms/' + currentRoom), (s) => {
            const q = s.val().words[s.val().qIdx];
            alert("İPUCU: İlk harf '" + q.a[0] + "'");
        }, {onlyOnce: true});
    };
</script>
</body>
</html>
