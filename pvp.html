<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WordZen | Arena</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { background:#000; color:#fff; font-family:'Montserrat', sans-serif; overflow:hidden; height: 100vh; }
        
        .wz-panel { display:none; height:100vh; width:100%; flex-direction:column; align-items:center; justify-content:center; position:fixed; top:0; left:0; z-index: 10; }
        .active { display:flex !important; }
        .bg-premium { background: radial-gradient(circle at center, #1a1a2e 0%, #000 100%); }

        /* BAHİS ONAY PANELİ */
        #bet-confirm-panel { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: rgba(0,0,0,0.9); backdrop-filter: blur(15px);
            z-index: 5000; display: none; align-items: center; justify-content: center;
        }
        .bet-card { 
            background: #1e1e2e; border: 2px solid #00d4ff; border-radius: 30px; 
            padding: 30px; width: 85%; max-width: 350px; text-align: center;
        }

        /* ARENA - KUTULARI YUKARI TAŞIDIK */
        #arena { background: #050505; justify-content: flex-start; padding-top: 40px; } /* Üstten boşluk verdik */
        #t-bar-cont { width:100%; height:6px; background:rgba(255,255,255,0.1); position:fixed; top:0; z-index: 100; }
        #t-bar { width:100%; height:100%; background:#39FF14; box-shadow: 0 0 15px #39FF14; transition: width 0.1s linear; }

        .p-heads { display:flex; justify-content:space-between; padding:10px 20px; width:100%; margin-bottom: 5px; }
        .p-sc { font-size:2.2rem; font-weight:900; }
        
        /* KELİME SIRASI - KLAVYEDEN UZAK EN ÜSTTE */
        #word-row { display:flex; gap:6px; margin:5px 0; justify-content:center; flex-wrap:wrap; min-height: 45px; width: 95%; }
        .slot { width:32px; height:42px; border:2px solid #39FF14; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:1.3rem; background:rgba(57,255,20,0.1); color: #fff; }
        
        /* SORU KUTUSU - KUTULARIN HEMEN ALTINDA */
        #cl-box { background:rgba(255,255,255,0.05); padding:12px; border-radius:15px; text-align:center; width:92%; border:1px solid #333; font-size:0.9rem; margin-top: 5px; }

        .btn-action { width:100%; padding:16px; border-radius:15px; border:none; font-weight:900; cursor:pointer; margin-top:10px; text-transform:uppercase; }
        .btn-yes { background: #39FF14; color: #000; }
        .btn-no { background: #ff4b2b; color: #fff; }

        #k-in { position:absolute; top:-1000px; opacity:0; }
    </style>
</head>
<body onclick="document.getElementById('k-in').focus()">

    <div id="bet-confirm-panel">
        <div class="bet-card">
            <h2 style="color:#00d4ff; margin-bottom:15px;">DÜELLO!</h2>
            <p id="bet-msg" style="margin-bottom:20px;">Bahis kabul edilsin mi?</p>
            <button class="btn-action btn-yes" onclick="confirmJoin(true)">KABUL ET</button>
            <button class="btn-action btn-no" onclick="confirmJoin(false)">REDDET</button>
        </div>
    </div>

    <div id="matchmaking-screen" class="wz-panel active bg-premium">
        <div class="bet-card" style="border-color: #333;">
            <h2 style="color:#00d4ff; margin-bottom:15px;">1V1 ARENA</h2>
            <input type="number" id="bet-amount" style="width:100%; padding:15px; border-radius:12px; background:#000; border:1px solid #444; color:#fff; text-align:center; margin-bottom:10px;" placeholder="BAHİS">
            <button class="btn-action" style="background:#00d4ff; color:#000;" onclick="createRoom()">ODA KUR</button>
            <div style="margin:10px; color:#444;">- VEYA -</div>
            <input type="number" id="room-code-in" style="width:100%; padding:15px; border-radius:12px; background:#000; border:1px solid #444; color:#fff; text-align:center; margin-bottom:10px;" placeholder="6 HANELİ KOD">
            <button class="btn-action btn-yes" onclick="joinRoom()">KATIL</button>
        </div>

        <div class="bet-card" id="ui-wait" style="display:none; border-color: #ffcc00; margin-top: 20px;">
            <h1 id="room-code-display" style="color:#ffcc00; font-size:2rem; letter-spacing:3px;">000000</h1>
            <p style="color:#aaa; margin-top:10px;">KIZIN KATILMASI BEKLENİYOR...</p>
            <button class="btn-action btn-no" onclick="location.reload()">İPTAL</button>
        </div>
    </div>

    <div id="arena" class="wz-panel">
        <div id="t-bar-cont"><div id="t-bar"></div></div>
        <div class="p-heads">
            <div style="text-align:center;"><div id="p1-n" style="font-size:0.7rem; color:#39FF14;">P1</div><div class="p-sc" id="p1-s" style="color:#39FF14;">0</div></div>
            <div style="font-size:1.2rem; color:#ff4b2b; align-self:center;">VS</div>
            <div style="text-align:center;"><div id="p2-n" style="font-size:0.7rem; color:#ff4b2b;">P2</div><div class="p-sc" id="p2-s" style="color:#ff4b2b;">0</div></div>
        </div>
        <div id="word-row"></div>
        <div id="cl-box">...</div>
        <input type="text" id="k-in" autocorrect="off" autocapitalize="none">
    </div>

    <div id="end-screen" class="wz-panel bg-premium">
        <img id="res-img" style="width:180px; margin-bottom:15px;" src="">
        <h1 id="res-msg" style="font-size:2rem; color:#ffcc00; margin-bottom:20px;"></h1>
        <button class="btn-action btn-yes" style="width:80%;" id="btn-replay" onclick="requestReplay()">TEKRAR OYNA</button>
        <button class="btn-action btn-no" style="width:80%; background:rgba(255,255,255,0.1);" onclick="location.href='index.html'">ANA MENÜ</button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCFgWqiyOv1UWfehf8zUtu4XqsXTrRdcZc",
        authDomain: "wordzen-2e052.firebaseapp.com",
        databaseURL: "https://wordzen-2e052-default-rtdb.firebaseio.com",
        projectId: "wordzen-2e052",
        storageBucket: "wordzen-2e052.firebasestorage.app",
        messagingSenderId: "309225718128",
        appId: "1:309225718128:web:8a38717b4b6fc8f3a18fb5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const u = JSON.parse(localStorage.getItem('wz_user')) || {name: "Oyuncu"};
    let rID, mRole, gData, timer, tempCode;

    const words = [
        {a:"ELMA", m:"Kırmızı veya yeşil meyve."},
        {a:"ARABA", m:"Dört tekerlekli ulaşım aracı."},
        {a:"GÜNEŞ", m:"Dünyayı ısıtan yıldız."},
        {a:"KALEM", m:"Yazı yazmakta kullanılır."},
        {a:"KİTAP", m:"Okunan sayfalar bütünü."}
    ];

    window.createRoom = () => {
        const bet = parseInt(document.getElementById('bet-amount').value) || 10;
        rID = Math.floor(100000 + Math.random() * 900000).toString();
        set(ref(db, 'rooms/' + rID), {
            id: rID, bet: bet, qIdx: 0, status: 'wait',
            p1: { name: u.name, score: 0, replay: false },
            p2: null, words: words.sort(() => Math.random() - 0.5)
        }).then(() => { 
            mRole = 'p1'; 
            document.getElementById('ui-wait').style.display = 'block';
            document.getElementById('room-code-display').innerText = rID;
            listen(); 
        });
    };

    window.joinRoom = async () => {
        tempCode = document.getElementById('room-code-in').value;
        const snapshot = await get(ref(db, 'rooms/' + tempCode));
        const d = snapshot.val();
        if(d && !d.p2) {
            document.getElementById('bet-msg').innerText = `${d.bet} Coin Bahis Kabul Edilsin mi?`;
            document.getElementById('bet-confirm-panel').style.display = 'flex';
        } else {
            alert("Oda bulunamadı veya maç başlamış!");
        }
    };

    window.confirmJoin = (choice) => {
        document.getElementById('bet-confirm-panel').style.display = 'none';
        if(choice) {
            update(ref(db, 'rooms/' + tempCode), {
                p2: { name: u.name, score: 0, replay: false },
                status: 'play'
            }).then(() => {
                rID = tempCode; mRole = 'p2'; listen();
            });
        }
    };

    function listen() {
        onValue(ref(db, 'rooms/' + rID), (s) => {
            gData = s.val();
            if(!gData) return;
            if(gData.status === 'play') startArena();
            if(gData.status === 'end') showResults();
            if(gData.p1.replay && gData.p2?.replay) resetGame();
        });
    }

    function startArena() {
        document.getElementById('matchmaking-screen').classList.remove('active');
        document.getElementById('end-screen').classList.remove('active');
        document.getElementById('arena').classList.add('active');
        renderRound();
    }

    function renderRound() {
        const q = gData.words[gData.qIdx];
        document.getElementById('p1-n').innerText = gData.p1.name;
        document.getElementById('p2-n').innerText = gData.p2?.name || "KIZ";
        document.getElementById('p1-s').innerText = gData.p1.score;
        document.getElementById('p2-s').innerText = gData.p2?.score || 0;
        document.getElementById('cl-box').innerText = q.m;
        
        const row = document.getElementById('word-row'); row.innerHTML = "";
        q.a.split('').forEach(() => { 
            const b = document.createElement('div'); b.className='slot'; row.appendChild(b); 
        });
        startTimer();
    }

    function startTimer() {
        let t = 100; clearInterval(timer);
        timer = setInterval(() => {
            t -= 0.8; document.getElementById('t-bar').style.width = t + "%";
            if(t <= 0) { clearInterval(timer); if(mRole === 'p1') nextQ(); }
        }, 100);
    }

    document.getElementById('k-in').oninput = function() {
        const q = gData.words[gData.qIdx];
        if(this.value.toUpperCase() === q.a.toUpperCase()) {
            update(ref(db, `rooms/${rID}/${mRole}`), { score: gData[mRole].score + 1 });
            this.value = "";
            nextQ();
        }
    };

    function nextQ() {
        if(gData.qIdx < gData.words.length - 1) {
            update(ref(db, 'rooms/' + rID), { qIdx: gData.qIdx + 1 });
        } else {
            update(ref(db, 'rooms/' + rID), { status: 'end' });
        }
    }

    function showResults() {
        clearInterval(timer);
        document.getElementById('arena').classList.remove('active');
        document.getElementById('end-screen').classList.add('active');
        const opponent = mRole === 'p1' ? 'p2' : 'p1';
        const win = gData[mRole].score > gData[opponent].score;
        new Audio(win ? 'winner.mp3' : 'lose.mp3').play();
        document.getElementById('res-img').src = win ? 'winner.jpg' : 'lose.jpg';
        document.getElementById('res-msg').innerText = win ? "KRAL SENSİN!" : "RAKİP KAZANDI...";
    }

    window.requestReplay = () => {
        update(ref(db, `rooms/${rID}/${mRole}`), { replay: true });
        document.getElementById('btn-replay').innerText = "BEKLENİYOR...";
    };

    function resetGame() {
        if(mRole === 'p1') {
            update(ref(db, 'rooms/' + rID), {
                status: 'play', qIdx: 0,
                'p1/score': 0, 'p1/replay': false,
                'p2/score': 0, 'p2/replay': false,
                words: words.sort(() => Math.random() - 0.5)
            });
        }
        document.getElementById('btn-replay').innerText = "TEKRAR OYNA";
    }
</script>
</body>
</html>
