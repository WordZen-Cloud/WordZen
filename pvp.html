<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Arena | Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { background:#0a0a0a; color:#fff; font-family:'Montserrat', sans-serif; overflow:hidden; }
        
        /* Ortak Panel Yapısı */
        .wz-panel { display:none; height:100vh; width:100%; flex-direction:column; align-items:center; justify-content:center; position:fixed; top:0; left:0; z-index: 10; }
        .active { display:flex !important; }

        /* Kayıt Ekranı ve Giriş Kartları */
        .glass-card { 
            background: rgba(20, 20, 20, 0.9); border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 30px; border-radius: 30px; width: 90%; max-width: 400px; text-align: center; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
        }
        
        .profile-upload { width: 100px; height: 100px; border-radius: 50%; border: 3px dashed #00d4ff; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; }
        .profile-upload img { width: 100%; height: 100%; object-fit: cover; }
        .profile-upload span { font-size: 0.7rem; color: #00d4ff; }

        .m-in { width:100%; padding:15px; margin:8px 0; border-radius:15px; background:#1a1a1a; border:1px solid #333; color:#fff; text-align:center; font-weight:700; outline:none; }
        .m-in:focus { border-color: #00d4ff; }
        
        .btn-act { width:100%; padding:18px; border-radius:15px; border:none; font-weight:800; cursor:pointer; margin-top:10px; text-transform:uppercase; background: #00d4ff; color: #000; }

        /* ARENA ARKA PLANI (Senin Fotoğrafın) */
        #arena { 
            background: url('arkaplan.jpg') no-repeat center center; 
            background-size: cover; 
            justify-content: flex-start; padding-top: 30px; display:none; flex-direction:column; align-items:center; height:100vh; 
        }
        #arena::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 0; }

        /* Oyun Elementleri */
        .p-heads { display:flex; justify-content:space-between; padding:20px; width:100%; z-index: 10; position: relative; }
        .p-sc { font-size:3.5rem; font-weight:900; }
        .p-img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #fff; margin-bottom: 5px; }

        #word-row { display:flex; gap:10px; margin: 30px 0; justify-content:center; flex-wrap:wrap; width:95%; z-index: 10; position: relative; }
        .slot { width:50px; height:65px; border:2px solid rgba(255,255,255,0.4); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:2rem; background:rgba(0,0,0,0.5); font-weight:900; color: #fff; }
        .slot.active { border-color: #00d4ff; box-shadow: 0 0 10px #00d4ff; }

        #cl-box { background:rgba(0,0,0,0.8); padding:20px; border-radius:20px; text-align:center; width:90%; border:1px solid rgba(255,255,255,0.1); font-size:1.1rem; z-index: 10; position: relative; }
        #k-in { position:absolute; top:-1000px; opacity:0; }
    </style>
</head>
<body onclick="document.getElementById('k-in').focus()">

    <div id="register-screen" class="wz-panel">
        <div class="glass-card">
            <h2 style="margin-bottom:20px;">KAYIT OL</h2>
            <div class="profile-upload" onclick="document.getElementById('p-file').click()">
                <img id="p-preview" src="" style="display:none;">
                <span id="p-text">FOTO SEÇ</span>
            </div>
            <input type="file" id="p-file" hidden accept="image/*" onchange="previewImg(this)">
            <input type="text" id="reg-name" class="m-in" placeholder="İSİM">
            <input type="number" id="reg-age" class="m-in" placeholder="YAŞ">
            <select id="reg-gender" class="m-in">
                <option value="Erkek">ERKEK</option>
                <option value="Kadın">KADIN</option>
            </select>
            <button class="btn-act" onclick="saveUser()">KAYDET</button>
        </div>
    </div>

    <div id="matchmaking-screen" class="wz-panel">
        <div class="glass-card" id="ui-setup">
            <div id="user-info" style="margin-bottom: 20px;">
                <img id="my-avatar" src="" style="width:60px; height:60px; border-radius:50%; border:2px solid #00d4ff;">
                <h3 id="my-name">...</h3>
            </div>
            <h2 style="color:#00d4ff;">ODA KUR</h2>
            <input type="number" id="bet-amount" class="m-in" placeholder="BAHİS">
            <button class="btn-act" onclick="createRoom()">ODA OLUŞTUR</button>
            <div style="margin:15px; opacity:0.3;">-- VEYA --</div>
            <input type="number" id="room-code-in" class="m-in" placeholder="KOD GİRİN">
            <button class="btn-act" style="background:#fff;" onclick="joinRoom()">KATIL</button>
        </div>
        
        <div class="glass-card" id="ui-wait" style="display:none;">
            <h2 style="color:#00d4ff;">ODA HAZIR!</h2>
            <h1 id="room-code-display" style="font-size:3.5rem; letter-spacing:5px;">000000</h1>
            <p style="opacity:0.5;">Rakip bekleniyor...</p>
            <button class="btn-act" style="background:#ff4b2b; color:#fff;" onclick="location.reload()">İPTAL</button>
        </div>
    </div>

    <div id="arena">
        <div id="start-timer" style="position:absolute; top:20px; font-size:3rem; z-index:100;"></div>
        <div class="p-heads">
            <div style="text-align:center;">
                <img id="p1-img" class="p-img" src="">
                <div class="p-sc" id="p1-s" style="color:#00d4ff;">0</div>
            </div>
            <div style="font-size:2rem; align-self:center; font-weight:900; z-index:10;">VS</div>
            <div style="text-align:center;">
                <img id="p2-img" class="p-img" src="">
                <div class="p-sc" id="p2-s" style="color:#ff4b2b;">0</div>
            </div>
        </div>
        <div id="word-row"></div>
        <div id="cl-box">Soru Yükleniyor...</div>
        <input type="text" id="k-in" autocorrect="off" autocapitalize="on" spellcheck="false">
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-database.js";
    import { wordList } from './kelimeler.js';

    const firebaseConfig = { databaseURL: "https://wordzen-2e052-default-rtdb.firebaseio.com" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let user = JSON.parse(localStorage.getItem('wz_pro_user'));
    let rID, mRole, gData;

    // Fotoğraf Önizleme
    window.previewImg = (input) => {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('p-preview').src = e.target.result;
                document.getElementById('p-preview').style.display = 'block';
                document.getElementById('p-text').style.display = 'none';
            };
            reader.readAsDataURL(input.files[0]);
        }
    };

    // Kullanıcı Kaydı
    window.saveUser = () => {
        const name = document.getElementById('reg-name').value;
        const age = document.getElementById('reg-age').value;
        const gender = document.getElementById('reg-gender').value;
        const img = document.getElementById('p-preview').src;

        if(!name || !age || !img || img === "") return alert("Tüm alanlar ve profil resmi zorunlu!");

        user = { name, age, gender, img };
        localStorage.setItem('wz_pro_user', JSON.stringify(user));
        initApp();
    };

    function initApp() {
        if(!user) {
            document.getElementById('register-screen').classList.add('active');
        } else {
            document.getElementById('register-screen').classList.remove('active');
            document.getElementById('matchmaking-screen').classList.add('active');
            document.getElementById('my-name').innerText = user.name;
            document.getElementById('my-avatar').src = user.img;
        }
    }

    // Oda Kurma
    window.createRoom = () => {
        const bet = document.getElementById('bet-amount').value || 0;
        rID = Math.floor(100000 + Math.random() * 900000).toString();
        const qs = wordList.sort(() => Math.random() - 0.5);
        set(ref(db, 'rooms/' + rID), {
            id: rID, bet: bet, qIdx: 0, status: 'wait',
            p1: { name: user.name, score: 0, img: user.img }, p2: null, words: qs
        }).then(() => { 
            mRole = 'p1'; listen(); 
            document.getElementById('ui-setup').style.display='none'; 
            document.getElementById('ui-wait').style.display='block'; 
            document.getElementById('room-code-display').innerText = rID; 
        });
    };

    // Katılma
    window.joinRoom = () => {
        const code = document.getElementById('room-code-in').value;
        onValue(ref(db, 'rooms/' + code), (s) => {
            const d = s.val(); if(!d || d.p2) return alert("Oda bulunamadı!");
            update(ref(db, 'rooms/' + code), { p2: { name: user.name, score: 0, img: user.img }, status: 'play' });
            rID = code; mRole = 'p2'; listen();
        }, {onlyOnce: true});
    };

    function listen() {
        onValue(ref(db, 'rooms/' + rID), (s) => {
            gData = s.val(); if(!gData) return;
            if(gData.status === 'play' && document.getElementById('arena').style.display !== 'flex') {
                document.getElementById('matchmaking-screen').classList.remove('active');
                document.getElementById('arena').style.display='flex';
                startCountdown();
            }
            if(gData.status === 'play' && gData.words[gData.qIdx]) {
                if(!document.querySelector('.slot') || document.querySelector('.slot').dataset.idx != gData.qIdx) renderRound();
            }
            if(gData.status === 'end') { /* Sonuç ekranı */ }
        });
    }

    function startCountdown() {
        let c = 5;
        const timer = document.getElementById('start-timer');
        const itv = setInterval(() => {
            timer.innerText = c; c--;
            if(c < 0) { clearInterval(itv); timer.style.display='none'; }
        }, 1000);
    }

    function renderRound() {
        const q = gData.words[gData.qIdx];
        document.getElementById('p1-img').src = gData.p1.img;
        document.getElementById('p2-img').src = gData.p2.img;
        document.getElementById('p1-s
