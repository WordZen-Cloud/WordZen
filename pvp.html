<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WordZen | 1v1 Arena</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#000; color:#fff; font-family:'Montserrat', sans-serif; overflow:hidden; }
        
        #matchmaking { position:fixed; top:0; left:0; width:100%; height:100%; background:linear-gradient(to right, #0f0c29, #302b63); z-index:100; display:flex; align-items:center; justify-content:center; }
        #arena { display:none; height:100vh; width:100%; flex-direction:column; background:linear-gradient(to bottom, #090e21, #1a2a6c); position:relative; }
        
        .m-card { background:rgba(255,255,255,0.05); backdrop-filter:blur(15px); padding:30px; border-radius:30px; border:1px solid rgba(255,255,255,0.1); width:90%; max-width:400px; text-align:center; }
        .m-in { width:100%; padding:15px; margin:10px 0; border-radius:15px; background:rgba(0,0,0,0.5); border:1px solid #444; color:#fff; text-align:center; font-weight:800; font-size:1.1rem; }
        .btn-act { width:100%; padding:18px; border-radius:20px; border:none; font-weight:900; cursor:pointer; margin-top:10px; }

        #t-bar-cont { width:100%; height:10px; background:#222; position:fixed; top:0; }
        #t-bar { width:100%; height:100%; background:linear-gradient(90deg, #ff4b2b, #39FF14); transition: width 0.1s linear; }

        .p-heads { display:flex; justify-content:space-between; padding:45px 20px 20px; }
        .p-i { width:70px; height:70px; border-radius:50%; border:3px solid #39FF14; object-fit:cover; }
        .p-s { font-size:2.5rem; font-weight:900; margin:5px 0; }
        
        #word-row { display:flex; gap:8px; margin-bottom:20px; justify-content:center; flex-wrap:wrap; }
        .slot { width:45px; height:60px; border:2px solid #fff; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:1.5rem; background:rgba(0,0,0,0.5); font-weight:900; }
        
        #k-in { position:absolute; top:-1000px; opacity:0; }
        
        #end-screen { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:1000; flex-direction:column; align-items:center; justify-content:center; }
        #vic-img { width:80%; max-width:300px; }
    </style>
</head>
<body onclick="document.getElementById('k-in').focus()">

    <div id="matchmaking">
        <div class="m-card">
            <h2 style="color:#39FF14; margin-bottom:20px;">1V1 ARENA</h2>
            <input type="number" id="b-val" class="m-in" placeholder="BAHİS JETONU">
            <button class="btn-act" style="background:#39FF14;" onclick="createRoom()">ODA KUR</button>
            <div style="margin:15px 0;">VEYA</div>
            <input type="number" id="r-code" class="m-in" placeholder="6 HANELİ KOD">
            <button class="btn-act" style="background:#00d4ff;" onclick="joinRoom()">ODAYA GİR</button>
        </div>
    </div>

    <div id="arena">
        <div id="t-bar-cont"><div id="t-bar"></div></div>
        <div class="p-heads">
            <div style="text-align:center;">
                <img id="p1-i" class="p-i" src="">
                <div class="p-s" id="p1-s">0</div>
                <div style="font-size:0.7rem;" id="p1-n">SEN</div>
            </div>
            <div style="font-size:1.5rem; color:#ff4b2b; padding-top:20px;">VS</div>
            <div style="text-align:center;">
                <img id="p2-i" class="p-i" src="" style="border-color:#ff4b2b;">
                <div class="p-s" id="p2-s" style="color:#ff4b2b;">0</div>
                <div style="font-size:0.7rem;" id="p2-n">RAKİP</div>
            </div>
        </div>
        <div id="q-area" style="text-align:center; padding:20px;">
            <div id="word-row"></div>
            <div id="cl-box" style="background:rgba(255,255,255,0.1); padding:15px; border-radius:15px;">...</div>
        </div>
        <input type="text" id="k-in">
    </div>

    <div id="end-screen">
        <img id="vic-img" src="">
        <h1 id="vic-txt" style="margin:20px 0;">...</h1>
        <button class="btn-act" style="background:#39FF14; width:80%;" onclick="location.href='index.html'">ANA SAYFA</button>
    </div>

<audio id="bg-m" loop src="fon-muzigi.mp3"></audio>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-database.js";

    // BURAYA KENDİ FIREBASE URL'Nİ YAZ KANKA YOKSA ODA KURULMAZ!
    const app = initializeApp({ databaseURL: "https://wordzen-default-rtdb.firebaseio.com" });
    const db = getDatabase(app);
    let u = JSON.parse(localStorage.getItem('wz_user'));
    let rID, mRole, gData, timer;

    window.createRoom = () => {
        const bet = parseInt(document.getElementById('b-val').value);
        if(!bet || u.coins < bet) return alert("Jeton yetersiz!");
        rID = Math.floor(100000 + Math.random() * 900000).toString();
        set(ref(db, 'rooms/' + rID), {
            id: rID, bet: bet, qIdx: 0, status: 'wait',
            p1: { name: u.name, score: 0, img: u.img, gender: u.gender },
            words: [{a:"DÜNYA", m:"Üzerinde yaşadığımız gezegen"}, {a:"ELMA", m:"Kırmızı bir meyve"}] // Örnek
        }).then(() => { mRole = 'p1'; listen(); });
    };

    window.joinRoom = () => {
        const code = document.getElementById('r-code').value;
        onValue(ref(db, 'rooms/' + code), (s) => {
            const d = s.val();
            if(!d) return alert("Oda yok!");
            if(confirm(d.bet + " Jetonla girmek istiyor musun?")) {
                update(ref(db, 'rooms/'+code), { p2: { name:u.name, score:0, img:u.img, gender:u.gender }, status:'play' });
                rID = code; mRole = 'p2'; listen();
            }
        }, { onlyOnce: true });
    };

    function listen() {
        onValue(ref(db, 'rooms/' + rID), (s) => {
            gData = s.val();
            if(gData.status === 'play') {
                document.getElementById('matchmaking').style.display = 'none';
                document.getElementById('arena').style.display = 'flex';
                document.getElementById('bg-m').play();
                startRound();
            }
            if(gData.status === 'end') endMatch();
        });
    }

    function startRound() {
        const q = gData.words[gData.qIdx];
        document.getElementById('p1-i').src = gData.p1.img;
        document.getElementById('p1-n').innerText = gData.p1.name;
        document.getElementById('p2-i').src = gData.p2.img;
        document.getElementById('p2-n').innerText = gData.p2.name;
        document.getElementById('p1-s').innerText = gData.p1.score;
        document.getElementById('p2-s').innerText = gData.p2.score;
        document.getElementById('cl-box').innerText = q.m;
        
        const row = document.getElementById('word-row'); row.innerHTML = "";
        q.a.split('').forEach(() => { const b = document.createElement('div'); b.className='slot'; row.appendChild(b); });
        
        let t = 100; clearInterval(timer);
        timer = setInterval(() => {
            t -= 0.33; document.getElementById('t-bar').style.width = t + "%";
            if(t <= 0) { clearInterval(timer); if(mRole==='p1' && gData.qIdx < 1) nextQ(); }
        }, 100);
    }

    document.getElementById('k-in').oninput = function() {
        const q = gData.words[gData.qIdx];
        this.value = this.value.toUpperCase();
        const slots = document.querySelectorAll('.slot');
        q.a.split('').forEach((h, i) => slots[i].innerText = this.value[i] || "");
        if(this.value === q.a) {
            update(ref(db, `rooms/${rID}/${mRole}`), { score: gData[mRole].score + 1 });
            this.value = "";
            if(gData.qIdx < 1) nextQ(); else update(ref(db, 'rooms/'+rID), {status:'end'});
        }
    };

    function nextQ() { update(ref(db, 'rooms/'+rID), { qIdx: gData.qIdx + 1 }); }

    function endMatch() {
        document.getElementById('arena').style.display = 'none';
        document.getElementById('end-screen').style.display = 'flex';
        const myScore = gData[mRole].score;
        const enemy = mRole === 'p1' ? gData.p2.score : gData.p1.score;
        
        if(myScore > enemy) {
            document.getElementById('vic-img').src = 'victory.png';
            document.getElementById('vic-txt').innerText = "KAZANDIN!";
            new Audio('win.mp3').play();
        } else {
            document.getElementById('vic-img').src = 'lose.png';
            document.getElementById('vic-txt').innerText = "KAYBETTİN!";
            new Audio('lose.mp3').play();
        }
    }
</script>
</body>
</html>
