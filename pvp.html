<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WordZen | Arena</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { width:100%; height:100vh; overflow:hidden; font-family:'Montserrat', sans-serif; background:#000; color:#fff; }
        
        /* GİRİŞ & EŞLEŞME (Image 4 Gibi, Dokunulmadı) */
        #matchmaking { position:fixed; top:0; left:0; width:100%; height:100%; background:linear-gradient(to right, #0f0c29, #302b63); z-index:5000; display:flex; align-items:center; justify-content:center; }
        .m-card { background:rgba(255,255,255,0.05); backdrop-filter:blur(15px); padding:30px; border-radius:30px; border:1px solid rgba(255,255,255,0.1); width:90%; max-width:400px; text-align:center; }
        
        /* ARENA (Tamamen Yenilendi, Hacker Tarzı Değil) */
        #arena { display:none; height:100vh; flex-direction:column; background: linear-gradient(to bottom, #090e21, #1a2a6c); position:relative; }
        
        /* 30 Saniye Barı - Modern ve Pürüzsüz */
        #t-bar-cont { width:100%; height:10px; background:#222; position:fixed; top:0; }
        #t-bar { width:100%; height:100%; background:linear-gradient(90deg, #ff4b2b, #39FF14); transition: width 0.1s linear; }

        /* Oyuncu Profilleri - 5 Sn Geri Sayım İçin */
        .p-heads { display:flex; justify-content:space-between; padding:40px 20px 20px; }
        .p-b { text-align:center; position:relative; }
        .p-i { width:60px; height:60px; border-radius:50%; border:3px solid #39FF14; margin-bottom:5px; }
        .p-info { font-size:0.8rem; color:#aaa; font-weight:normal; }
        .p-s { font-size:2.5rem; font-weight:900; color:#fff; }
        
        /* Maç Önü 5 Saniye */
        #start-timer { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:10rem; color:#39FF14; text-shadow:0 0 50px #39FF14; z-index:200; display:none; }

        /* Oyun Alanı */
        #q-area { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; }
        #word-row { display:flex; gap:10px; margin-bottom:20px; }
        .slot { width:55px; height:70px; border:3px solid #fff; border-radius:15px; display:flex; align-items:center; justify-content:center; font-size:2rem; background:rgba(0,0,0,0.5); }
        .correct { background:#39FF14 !important; border-color:#39FF14 !important; color:#000; }

        /* Gizli Input (Kendi Klavyemiz İçin) */
        #k-in { position:absolute; opacity:0; pointer-events:none; }

        /* EMOJİ VE HAZIR CEVAP PANELİ */
        #emo-btn { position:fixed; bottom:20px; left:20px; font-size:2rem; color:#39FF14; z-index:100; cursor:pointer; }
        #emo-panel { display:none; position:fixed; bottom:70px; left:20px; background:rgba(0,0,0,0.9); border-radius:20px; padding:15px; width:85%; max-width:300px; border:1px solid #333; z-index:101; }
        .e-opt { font-size:2rem; margin:5px; cursor:pointer; display:inline-block; }
        .t-opt { padding:10px; background:#222; border-radius:10px; margin:5px 0; font-size:0.9rem; cursor:pointer; }
        #emo-bubble { display:none; position:absolute; bottom:80px; left:50%; transform:translateX(-50%); background:rgba(255,255,255,0.1); backdrop-filter:blur(5px); padding:10px 20px; border-radius:15px; z-index:100; font-weight:800; border:1px solid #333; }

        /* SONUÇ EKRANI (Victory Image 7 Gibi) */
        #end-screen { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:6000; flex-direction:column; align-items:center; justify-content:center; }
        #vic-img { width:300px; margin-bottom:20px; }
        .p-total { font-size:1.8rem; color:#ffcc00; margin-bottom:30px; }
        
        .btn-act { width:100%; padding:18px; border-radius:20px; border:none; font-weight:900; font-size:1.1rem; cursor:pointer; margin-top:10px; }
        input.m-in { width:100%; padding:15px; margin:10px 0; border-radius:15px; background:rgba(0,0,0,0.5); border:1px solid #444; color:#fff; text-align:center; font-weight:800; font-size:1.1rem; }
    </style>
</head>
<body>

    <div id="matchmaking">
        <div class="m-card">
            <h2 style="color:#39FF14; margin-bottom:20px;">1V1 ARENA</h2>
            <input type="number" id="b-val" class="m-in" placeholder="BAHİS (Örn: 100)">
            <button class="btn-act" style="background:#39FF14; color:#000;" onclick="createRoom()">ODA KUR</button>
            <div style="margin:15px 0; color:#aaa;">VEYA</div>
            <input type="number" id="r-code" class="m-in" placeholder="6 HANELİ ODA KODU">
            <button class="btn-act" style="background:#00d4ff; color:#000;" onclick="joinRoom()">ODAYA GİR</button>
        </div>
    </div>

    <div id="arena" onclick="document.getElementById('k-in').focus()">
        <div id="t-bar-cont"><div id="t-bar"></div></div>
        <div id="start-timer">5</div>
        <div id="emo-bubble">...</div>
        
        <div class="p-heads">
            <div class="p-b">
                <img id="p1-i" class="p-i" src="">
                <div class="p-s" id="p1-s">0</div>
                <div class="p-info"><span id="p1-n">SEN</span> / <span id="p1-g">...</span></div>
            </div>
            <div style="font-size:1.5rem; color:#ff4b2b; padding-top:20px; font-weight:normal;">VS</div>
            <div class="p-b">
                <img id="p2-i" class="p-i" src="" style="border-color:#ff4b2b;">
                <div class="p-s" id="p2-s" style="color:#ff4b2b;">0</div>
                <div class="p-info"><span id="p2-n">RAKİP</span> / <span id="p2-g">...</span></div>
            </div>
        </div>

        <div id="q-area">
            <div id="word-row"></div>
            <div id="cl-box" style="background:rgba(0,0,0,0.7); padding:15px; border-radius:15px; text-align:center; width:90%; border:1px solid #333;">...</div>
        </div>

        <input type="text" id="k-in" maxlength="10" autocorrect="off" autocapitalize="on" spellcheck="false">
        
        <div id="emo-btn" onclick="toggleEmo()"><i class="fas fa-laugh-beam"></i></div>
        <div id="emo-panel">
            <div class="e-opt" onclick="sendEmo('😎')">😎</div><div class="e-opt" onclick="sendEmo('😈')">😈</div><div class="e-opt" onclick="sendEmo('❤️')">❤️</div><div class="e-opt" onclick="sendEmo('🧠')">🧠</div><div class="e-opt" onclick="sendEmo('💩')">💩</div><div class="e-opt" onclick="sendEmo('😭')">😭</div>
            <div class="t-opt" onclick="sendEmo('Eyvah!')">Eyvah!</div><div class="t-opt" onclick="sendEmo('Bravo!')">Bravo!</div><div class="t-opt" onclick="sendEmo('İyi oyundu!')">İyi oyundu!</div>
        </div>
    </div>

    <div id="end-screen">
        <img id="vic-img" src="">
        <h1 id="vic-txt" style="font-size:3rem; margin-bottom:10px;">KAZANDIN!</h1>
        <div class="p-total">TOPLAM ÖDÜL: 🪙 <span id="cc-total">0</span></div>
        <button class="btn-act" style="background:#39FF14; color:#000; width:80%;" onclick="location.href='modlar.html'">ANA MENÜ</button>
    </div>

<audio id="a-m" loop src="fon-muzigi.mp3"></audio>
<script src="https://kit.fontawesome.com/a076d05399.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-database.js";
    import { wordList } from './kelimeler.js'; // Hazır kelime listesi buraya at kanka

    const app = initializeApp({ databaseURL: "YOUR_FIREBASE_URL" });
    const db = getDatabase(app);
    let u = JSON.parse(localStorage.getItem('wz_user')) || {name:"Oyuncu",coins:500,gender:"..."};
    let rID, mRole, gData, timer, preTimer;
    const aM = document.getElementById('a-m');
    aM.volume = localStorage.getItem('wz_vol') || 0.5;

    // 1. ODA KURMA (Sadece Sayı)
    window.createRoom = () => {
        const bet = parseInt(document.getElementById('b-val').value);
        if(!bet || u.coins < bet) return alert("Jetonun yetmiyor kanka!");
        rID = Math.floor(100000 + Math.random() * 900000).toString();
        
        // 10 Hazır kelime seç
        const qList = []; for(let i=0; i<10; i++) qList.push(wordList[Math.floor(Math.random()*wordList.length)]);

        set(ref(db, 'rooms/' + rID), {
            id: rID, bet: bet, qIdx: 0, status: 'wait',
            p1: { name: u.name, score: 0, gender: u.gender, img: u.img, emo: null },
            p2: null, words: qList
        }).then(() => {
            mRole = 'p1';
            document.getElementById('matchmaking').style.display = 'none';
            document.getElementById('u-wait').style.display = 'block'; // Görüntüle
            listen();
        });
    };

    // 2. ODAYA GİRİŞ & BAHİS ONAYI
    window.joinRoom = () => {
        const code = document.getElementById('r-code').value;
        onValue(ref(db, 'rooms/' + code), (s) => {
            const d = s.val();
            if(!d || d.p2) return alert("Oda bulunamadı veya dolu!");
            if(u.coins < d.bet) return alert("Bahis için jetonun eksik!");

            // BAHİS ONAY PANELİ (Kendi panelimiz)
            const confirmBet = confirm(`${d.bet} jeton karşılığında ${d.p1.name}'in odasına katılmak istiyor musun kanka?`);
            if(!confirmBet) return;

            update(ref(db, 'rooms/' + code), {
                p2: { name: u.name, score: 0, gender: u.gender, img: u.img, emo: null },
                status: 'play' // Maçı başlat
            });
            mRole = 'p2'; rID = code; listen();
        }, { onlyOnce: true });
    };

    function listen() {
        onValue(ref(db, 'rooms/' + rID), (s) => {
            gData = s.val();
            if(!gData) return;
            // Emoji Kontrolü
            const enemyRole = mRole === 'p1' ? 'p2' : 'p1';
            if(gData[enemyRole] && gData[enemyRole].emo) { showEmo(gData[enemyRole].emo); update(ref(db, `rooms/${rID}/${enemyRole}`), {emo:null}); }

            if(gData.status === 'play') {
                document.getElementById('matchmaking').style.display = 'none';
                document.getElementById('arena').style.display = 'flex';
                aM.play();
                startPreTimer();
            }
        });
    }

    // 5 Saniye Geri Sayım (Maç Önü)
    function startPreTimer() {
        if(preTimer) return; // Zaten çalışıyorsa
        const txtID = document.getElementById('start-timer');
        txtID.style.display = 'block';
        let count = 5;
        // Profil bilgilerini yükle
        document.getElementById('p1-i').src = gData.p1.img; document.getElementById('p1-n').innerText = gData.p1.name; document.getElementById('p1-g').innerText = gData.p1.gender;
        document.getElementById('p2-i').src = gData.p2.img; document.getElementById('p2-n').innerText = gData.p2.name; document.getElementById('p2-g').innerText = gData.p2.gender;

        preTimer = setInterval(() => {
            count--; txtID.innerText = count;
            if(count <= 0) { clearInterval(preTimer); txtID.style.display = 'none'; startRound(); }
        }, 1000);
    }

    function startRound() {
        const q = gData.words[gData.qIdx];
        document.getElementById('p1-s').innerText = gData.p1.score;
        document.getElementById('p2-s').innerText = gData.p2.score;
        document.getElementById('cl-box').innerText = q.m;
        const row = document.getElementById('word-row'); row.innerHTML = "";
        q.a.split('').forEach(() => { const b = document.createElement('div'); b.className='slot'; row.appendChild(b); });
        
        // 30 Saniye Barı - Modern
        let time = 100; clearInterval(timer);
        timer = setInterval(() => {
            time -= 0.33; // Yaklaşık 30 saniye
            document.getElementById('t-bar').style.width = time + "%";
            if(time <= 0) { clearInterval(timer); if(mRole === 'p1') nextQuestion(); }
        }, 100);
    }

    // Kendi Klavyemiz & Büyük Harf Fix
    document.getElementById('k-in').oninput = function() {
        const q = gData.words[gData.qIdx];
        this.value = this.value.toUpperCase(); // Büyük harf yap
        const slots = document.querySelectorAll('.slot');
        q.a.split('').forEach((harf, i) => { slots[i].innerText = this.value[i] || ""; });

        if(this.value === q.a) {
            new Audio('dogru.mp3').play();
            update(ref(db, `rooms/${rID}/${mRole}`), { score: gData[mRole].score + 1 });
            this.value = "";
            if(gameData.qIdx < 9) nextQuestion(); else endMatch(); // 10 Soru bitti
        }
    }

    function nextQuestion() {
        update(ref(db, 'rooms/'+rID), { qIdx: gameData.qIdx + 1 });
    }

    // SONUÇ EKRANI (Victory Image 7)
    function endMatch() {
        update(ref(db, 'rooms/'+rID), { status: 'end' });
        const myScore = gData[mRole].score;
        const enemyRole = mRole === 'p1' ? 'p2' : 'p1';
        const enemyScore = gData[enemyRole].score;
        const prize = gData.bet * 2;

        document.getElementById('arena').style.display = 'none';
        document.getElementById('end-screen').style.display = 'flex';
        aM.pause();

        if(myScore > enemyScore) {
            new Audio('win.mp3').play();
            document.getElementById('vic-img').src = 'victory.png'; // Image 7
            document.getElementById('vic-txt').innerText = "KAZANDIN!";
            document.getElementById('cc-total').innerText = prize;
            u.coins += prize; localStorage.setItem('wz_user', JSON.stringify(u));
        } else if(myScore < enemyScore) {
            new Audio('lose.mp3').play();
            document.getElementById('vic-img').src = 'lose.png'; // Lose resmi at buraya
            document.getElementById('vic-txt').innerText = "KAYBETTİN!"; document.getElementById('vic-txt').style.color="red";
            document.getElementById('cc-total').innerText = 0;
            u.coins -= gData.bet; localStorage.setItem('wz_user', JSON.stringify(u));
        } else {
            alert("Berabere! Jetonlar iade kanka.");
            location.href='modlar.html';
        }
    }

    // Emoji Paneli Kontrolü
    window.toggleEmo = () => { const p = document.getElementById('emo-panel'); p.style.display = p.style.display==='block'?'none':'block'; }
    window.sendEmo = (e) => { update(ref(db, `rooms/${rID}/${mRole}`), {emo:e}); toggleEmo(); showEmo(e); }
    function showEmo(e) {
        const b = document.getElementById('emo-bubble'); b.innerText = e; b.style.display = 'block';
        setTimeout(() => b.style.display = 'none', 3000);
    }
</script>
</body>
</html>
