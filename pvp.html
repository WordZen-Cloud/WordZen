<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>WordZen | 1v1 Arena</title>
    <style>
        /* PvP'ye özel stiller */
        #timer-bar { width:100%; height:10px; background:#333; position:fixed; top:0; }
        #timer-fill { width:100%; height:100%; background:#39FF14; transition: linear; }
        .player-info { display:flex; justify-content:space-around; width:100%; margin-top:50px; }
        .score { font-size:2rem; font-weight:900; }
        #matchmaking { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:2000; }
        .loader { border: 8px solid #f3f3f3; border-top: 8px solid #00d4ff; border-radius: 50%; width: 60px; height: 60px; animation: spin 2s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="matchmaking">
        <div class="loader"></div>
        <h2 id="match-status">EŞLEŞME ARANIYOR...</h2>
        <input type="text" id="room-input" placeholder="WZ-6 HANE GİR">
        <button onclick="joinRoom()">ODAYA GİR</button>
        <button onclick="createRoom()">ODA KUR (500 Jeton)</button>
        <button onclick="history.back()">İPTAL</button>
    </div>

    <div id="pvp-ui" style="display:none;">
        <div id="timer-bar"><div id="timer-fill"></div></div>
        <div class="player-info">
            <div>BEN: <span id="my-score">0</span></div>
            <div>RAKİP: <span id="opp-score">0</span></div>
        </div>
        <div id="word-display"></div>
        <div id="clue"></div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, onDisconnect } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-database.js";
    import { wordList } from './kelimeler.js';

    // Firebase ayarlarını buraya koy kanka
    const db = getDatabase();
    let myUid = localStorage.getItem('wz_uid');
    let profile = JSON.parse(localStorage.getItem('wz_profile'));
    let currentRoom = null;
    let currentQuestion = 0;
    let timer;

    window.createRoom = () => {
        if(profile.coins < 500) return alert("Jetonun yok fakir kanka!");
        const roomID = "WZ-" + Math.floor(100000 + Math.random() * 900000);
        currentRoom = roomID;
        
        // 10 Rastgele Kelime Seç
        const gameWords = [];
        for(let i=0; i<10; i++) gameWords.push(wordList[Math.floor(Math.random()*wordList.length)]);

        set(ref(db, 'rooms/' + roomID), {
            p1: myUid,
            p1Name: profile.name,
            p1Score: 0,
            p2: null,
            bet: 500,
            words: gameWords,
            status: 'waiting',
            activeQuestion: 0,
            startTime: Date.now()
        });
        
        document.getElementById('match-status').innerText = "ODA KURULDU: " + roomID;
        listenRoom(roomID);
    };

    function startTimer() {
        let timeLeft = 15;
        document.getElementById('timer-fill').style.width = '100%';
        clearInterval(timer);
        timer = setInterval(() => {
            timeLeft -= 1;
            document.getElementById('timer-fill').style.width = (timeLeft / 15 * 100) + '%';
            if(timeLeft <= 0) {
                nextQuestion();
            }
        }, 1000);
    }

    // Gerçek zamanlı eşleşme ve puanlama mantığı buraya gelecek kanka...
</script>
</body>
</html>
