<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WordZen | 1V1 Arena</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { width:100%; height:100vh; overflow:hidden; font-family:'Montserrat', sans-serif; background:#000; color:#fff; }
        
        /* 1. EŞLEŞME EKRANI - CAM EFEKTİ (Hacker Tarzı Değil!) */
        #matchmaking { 
            position:fixed; top:0; left:0; width:100%; height:100%; 
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d); 
            display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:5000; padding:20px;
        }
        .glass-card { 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(25px); 
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 35px; border-radius: 40px; width: 100%; max-width: 420px; text-align: center;
        }
        .m-input { 
            width:100%; padding:18px; border-radius:20px; border:none; 
            background:rgba(255,255,255,0.15); color:#fff; font-size:1.3rem; 
            text-align:center; margin:15px 0; font-weight: 800;
        }

        /* 2. OYUN ARENASI */
        #arena { display:none; height:100vh; flex-direction:column; background: #0f0c29; }
        #timer-container { width:100%; height:12px; background:rgba(255,255,255,0.1); position:fixed; top:0; }
        #timer-bar { width:100%; height:100%; background:linear-gradient(90deg, #00d4ff, #39FF14); transition: width 0.1s linear; }

        .p-header { display:flex; justify-content:space-between; padding:40px 25px; background:rgba(0,0,0,0.3); }
        .score { font-size:3rem; font-weight:900; }

        /* KUTUCUKLAR VE KLAVYE */
        #word-row { display:flex; gap:10px; margin: 30px 0; flex-wrap:wrap; justify-content:center; }
        .box { width:55px; height:70px; background:rgba(255,255,255,0.1); border:3px solid rgba(255,255,255,0.3); border-radius:15px; display:flex; align-items:center; justify-content:center; font-size:2rem; font-weight:900; }
        .correct { background:#39FF14 !important; color:#000 !important; border-color:#39FF14 !important; }

        #kb { height:38vh; background:rgba(0,0,0,0.9); padding:10px; display:flex; flex-direction:column; gap:8px; border-top:2px solid #333; }
        .row { display:flex; gap:5px; flex:1; }
        .key { flex:1; background:#2a2a2a; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:1.4rem; font-weight:900; border-bottom:5px solid #000; }
        .key:active { transform:translateY(3px); border-bottom:1px solid #000; background:#39FF14; color:#000; }

        .btn { width:100%; padding:18px; border-radius:15px; border:none; font-weight:900; cursor:pointer; }
    </style>
</head>
<body>

    <div id="matchmaking">
        <div class="glass-card">
            <h1 style="margin-bottom:10px;">WordZen 1V1</h1>
            <div id="ui-setup">
                <input type="number" id="bet" class="m-input" placeholder="BAHİS JETON">
                <button class="btn" style="background:#39FF14; color:#000;" onclick="createRoom()">ODA KUR</button>
                <div style="margin:15px 0; opacity:0.5;">--- VEYA ---</div>
                <input type="text" id="code" class="m-input" placeholder="WZ-XXXXXX">
                <button class="btn" style="background:#00d4ff; color:#000;" onclick="joinRoom()">ODAYA GİR</button>
            </div>
            
            <div id="ui-wait" style="display:none;">
                <h2 id="room-id" style="font-size:2.5rem; color:#ffcc00;">WZ-000000</h2>
                <p style="margin:20px 0;">Rakip Bekleniyor...</p>
                <button class="btn" style="background:#ff4b2b; color:#fff;" onclick="location.reload()">İPTAL</button>
            </div>
        </div>
    </div>

    <div id="arena">
        <div id="timer-container"><div id="timer-bar"></div></div>
        <div class="p-header">
            <div style="text-align:center;"><p id="p1-n">SEN</p><div class="score" id="p1-s">0</div></div>
            <div style="font-size:1.5rem; color:red; padding-top:20px;">VS</div>
            <div style="text-align:center;"><p id="p2-n">RAKİP</p><div class="score" id="p2-s">0</div></div>
        </div>
        <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;">
            <div id="word-row"></div>
            <div id="clue" style="background:rgba(255,255,255,0.1); padding:20px; border-radius:20px; width:85%; text-align:center;">...</div>
        </div>
        <div id="kb"></div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-database.js";
    import { wordList } from './kelimeler.js';

    // Firebase Ayarları
    const app = initializeApp({ databaseURL: "https://wordzen-2e052-default-rtdb.firebaseio.com" });
    const db = getDatabase(app);
    let u = JSON.parse(localStorage.getItem('wz_user')) || {name:"Oyuncu", coins:500};
    let myRole, roomID, game, timer;

    // ODA KURMA (Donma Engelleyici Fix)
    window.createRoom = () => {
        const betVal = parseInt(document.getElementById('bet').value);
        if(!betVal || u.coins < betVal) return alert("Jeton yetersiz!");
        
        roomID = "WZ-" + Math.floor(100000 + Math.random() * 900000);
        const q = []; for(let i=0; i<10; i++) q.push(wordList[Math.floor(Math.random()*wordList.length)]);

        set(ref(db, 'rooms/' + roomID), {
            id: roomID, bet: betVal, qIdx: 0, status: 'wait',
            p1: { name: u.name, score: 0 }, p2: null, words: q
        }).then(() => {
            myRole = 'p1';
            document.getElementById('ui-setup').style.display = 'none';
            document.getElementById('ui-wait').style.display = 'block';
            document.getElementById('room-id').innerText = roomID;
            listen();
        });
    };

    window.joinRoom = () => {
        const code = document.getElementById('code').value.toUpperCase();
        onValue(ref(db, 'rooms/' + code), (s) => {
            const d = s.val();
            if(!d || d.p2) return alert("Oda geçersiz!");
            update(ref(db, 'rooms/' + code), { p2: { name: u.name, score: 0 }, status: 'play' });
            myRole = 'p2'; roomID = code; listen();
        }, { onlyOnce: true });
    };

    function listen() {
        onValue(ref(db, 'rooms/' + roomID), (s) => {
            game = s.val();
            if(game && game.status === 'play') {
                document.getElementById('matchmaking').style.display = 'none';
                document.getElementById('arena').style.display = 'flex';
                start();
            }
        });
    }

    function start() {
        const q = game.words[game.qIdx];
        document.getElementById('p1-s').innerText = game.p1.score;
        document.getElementById('p2-s').innerText = game.p2.score;
        document.getElementById('clue').innerText = q.m;
        const row = document.getElementById('word-row'); row.innerHTML = "";
        q.a.split('').forEach(() => { const b = document.createElement('div'); b.className='box'; row.appendChild(b); });
        
        let t = 100; clearInterval(timer);
        timer = setInterval(() => {
            t -= 0.66; document.getElementById('timer-bar').style.width = t + "%";
            if(t <= 0) { clearInterval(timer); if(myRole === 'p1') next(); }
        }, 100);
    }

    function next() {
        if(game.qIdx < 9) update(ref(db, 'rooms/'+roomID), { qIdx: game.qIdx + 1 });
        else alert("Oyun Bitti!");
    }

    // KLAVYE SİSTEMİ
    const keys = [["Q","W","E","R","T","Y","U","I","İ","O","P"],["A","S","D","F","G","Ğ","H","J","K","L","Ş"],["Z","X","C","V","B","N","M","Ö","Ç","Ü","SİL"]];
    keys.forEach(r => {
        const d = document.createElement('div'); d.className='row';
        r.forEach(k => {
            const b = document.createElement('div'); b.className='key'; b.innerText=k;
            b.onclick = () => {
                const boxes = document.querySelectorAll('.box');
                if(k === "SİL") { for(let i=boxes.length-1; i>=0; i--) if(boxes[i].innerText!=="") { boxes[i].innerText=""; break; } }
                else {
                    for(let i=0; i<boxes.length; i++) if(boxes[i].innerText==="") { 
                        boxes[i].innerText=k; 
                        let res = ""; document.querySelectorAll('.box').forEach(bx => res += bx.innerText);
                        if(res === game.words[game.qIdx].a) {
                            update(ref(db, `rooms/${roomID}/${myRole}`), { score: game[myRole].score + 1 });
                            next();
                        }
                        break; 
                    }
                }
            };
            d.appendChild(b);
        });
        document.getElementById('kb').appendChild(d);
    });
</script>
</body>
</html>
