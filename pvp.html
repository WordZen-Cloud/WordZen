<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WordZen | 1V1 Arena</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { width:100%; height:100vh; overflow:hidden; font-family:'Montserrat', sans-serif; background:#000; color:#fff; }
        
        /* 1. KAYIT EKRANI (Yenge İçin İsim Girişi) */
        #registration {
            position:fixed; top:0; left:0; width:100%; height:100%; 
            background: #000; display:flex; align-items:center; justify-content:center; z-index:6000;
        }

        /* 2. EŞLEŞME EKRANI */
        #matchmaking { 
            position:fixed; top:0; left:0; width:100%; height:100%; 
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d); 
            display:none; flex-direction:column; align-items:center; justify-content:center; z-index:5000; padding:20px;
        }
        .glass-card { 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(25px); 
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 35px; border-radius: 40px; width: 100%; max-width: 420px; text-align: center;
        }
        .m-input { 
            width:100%; padding:18px; border-radius:20px; border:none; 
            background:rgba(255,255,255,0.15); color:#fff; font-size:1.3rem; 
            text-align:center; margin:15px 0; font-weight: 800;
        }

        /* 3. OYUN ARENASI (Kutucuklar Yukarıda) */
        #arena { 
            display:none; height:100vh; flex-direction:column; 
            background: url('arkaplan.jpg') no-repeat center center; 
            background-size: cover; position: relative;
        }
        #arena::before {
            content: ""; position: absolute; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.5); z-index: 0;
        }
        #arena-content { position: relative; z-index: 1; display: flex; flex-direction: column; height: 100%; }

        #timer-container { width:100%; height:12px; background:rgba(255,255,255,0.1); position:fixed; top:0; }
        #timer-bar { width:100%; height:100%; background:linear-gradient(90deg, #00d4ff, #39FF14); transition: width 0.1s linear; }

        .p-header { display:flex; justify-content:space-between; padding:30px 25px 10px; }
        .score { font-size:2.5rem; font-weight:900; color: #39FF14; }

        /* KUTUCUKLAR VE ANLAM YUKARI TAŞINDI */
        #game-play-area { margin-top: 10px; display: flex; flex-direction: column; align-items: center; }
        #word-row { display:flex; gap:8px; margin: 15px 0; flex-wrap:wrap; justify-content:center; }
        .box { 
            width:45px; height:60px; background:rgba(255,255,255,0.1); 
            border:2px solid rgba(255,255,255,0.3); border-radius:10px; 
            display:flex; align-items:center; justify-content:center; 
            font-size:1.6rem; font-weight:900; color: #fff;
        }
        #clue { 
            background:rgba(0,0,0,0.6); padding:15px; border-radius:15px; 
            width:90%; text-align:center; border:1px solid rgba(255,255,255,0.2);
            font-size:1.1rem;
        }

        #hidden-input { position: absolute; opacity: 0; pointer-events: none; }

        #end-screen { 
            display:none; position:fixed; top:0; left:0; width:100%; height:100%; 
            background:rgba(0,0,0,0.95); z-index:7000; flex-direction:column; align-items:center; justify-content:center; 
        }
        .btn { width:100%; padding:18px; border-radius:15px; border:none; font-weight:900; cursor:pointer; margin-top:10px; }
    </style>
</head>
<body onclick="focusInput()">

    <div id="registration">
        <div class="glass-card">
            <h2 style="margin-bottom:20px;">ARENA GİRİŞİ</h2>
            <input type="text" id="user-name-input" class="m-input" placeholder="İSMİNİZİ YAZIN">
            <button class="btn" style="background:#39FF14; color:#000;" onclick="startRegistration()">GİRİŞ YAP</button>
        </div>
    </div>

    <div id="matchmaking">
        <div class="glass-card">
            <h1 style="margin-bottom:10px;">WordZen 1V1</h1>
            <div id="ui-setup">
                <input type="number" id="bet" class="m-input" placeholder="BAHİS JETON">
                <button class="btn" style="background:#39FF14; color:#000;" onclick="createRoom()">ODA KUR</button>
                <div style="margin:15px 0; opacity:0.5;">--- VEYA ---</div>
                <input type="text" id="code" class="m-input" placeholder="WZ-XXXXXX">
                <button class="btn" style="background:#00d4ff; color:#000;" onclick="joinRoom()">ODAYA GİR</button>
            </div>
            
            <div id="ui-wait" style="display:none;">
                <h2 id="room-id" style="font-size:2.5rem; color:#ffcc00;">WZ-000000</h2>
                <p style="margin:20px 0;">Rakip Bekleniyor...</p>
                <button class="btn" style="background:#ff4b2b; color:#fff;" onclick="location.reload()">İPTAL</button>
            </div>
        </div>
    </div>

    <div id="arena">
        <div id="arena-content">
            <div id="timer-container"><div id="timer-bar"></div></div>
            <div class="p-header">
                <div style="text-align:center;"><p id="p1-n">...</p><div class="score" id="p1-s">0</div></div>
                <div style="font-size:1.5rem; color:red; padding-top:10px;">VS</div>
                <div style="text-align:center;"><p id="p2-n">...</p><div class="score" id="p2-s">0</div></div>
            </div>
            
            <div id="game-play-area">
                <div id="word-row"></div>
                <div id="clue">...</div>
            </div>
            
            <input type="text" id="hidden-input" autocomplete="off">
        </div>
    </div>

    <div id="end-screen">
        <div class="glass-card">
            <h1 id="end-title">MAÇ BİTTİ</h1>
            <p id="end-msg" style="margin:20px 0; font-size:1.2rem;"></p>
            <button class="btn" style="background:#39FF14; color:#000;" onclick="rematch()">TEKRAR OYNA</button>
            <button class="btn" style="background:#fff; color:#000;" onclick="location.href='index.html'">ANA SAYFA</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, remove } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-database.js";
    import { wordList } from './kelimeler.js';

    const app = initializeApp({ databaseURL: "https://wordzen-2e052-default-rtdb.firebaseio.com" });
    const db = getDatabase(app);
    let currentUser = {name: "Oyuncu", coins: 500};
    let myRole, roomID, game, timer;

    window.startRegistration = () => {
        const name = document.getElementById('user-name-input').value;
        if(!name) return alert("İsim lazım kanka!");
        currentUser.name = name;
        document.getElementById('registration').style.display = 'none';
        document.getElementById('matchmaking').style.display = 'flex';
    };

    window.focusInput = () => { document.getElementById('hidden-input').focus(); };

    window.createRoom = () => {
        const betVal = parseInt(document.getElementById('bet').value);
        if(!betVal) return alert("Bahis miktarını gir!");
        roomID = "WZ-" + Math.floor(100000 + Math.random() * 900000);
        const q = wordList.sort(() => 0.5 - Math.random()).slice(0, 10);
        set(ref(db, 'rooms/' + roomID), {
            id: roomID, bet: betVal, qIdx: 0, status: 'wait',
            p1: { name: currentUser.name, score: 0 }, p2: null, words: q, rematch: {p1:false, p2:false}
        }).then(() => {
            myRole = 'p1';
            document.getElementById('ui-setup').style.display = 'none';
            document.getElementById('ui-wait').style.display = 'block';
            document.getElementById('room-id').innerText = roomID;
            listen();
        });
    };

    window.joinRoom = () => {
        const code = document.getElementById('code').value.toUpperCase();
        onValue(ref(db, 'rooms/' + code), (s) => {
            const d = s.val();
            if(!d || d.p2) return alert("Oda geçersiz!");
            update(ref(db, 'rooms/' + code), { p2: { name: currentUser.name, score: 0 }, status: 'play' });
            myRole = 'p2'; roomID = code; listen();
        }, { onlyOnce: true });
    };

    function listen() {
        onValue(ref(db, 'rooms/' + roomID), (s) => {
            game = s.val();
            if(!game) return;
            if(game.status === 'play') {
                document.getElementById('matchmaking').style.display = 'none';
                document.getElementById('arena').style.display = 'flex';
                document.getElementById('end-screen').style.display = 'none';
                document.getElementById('p1-n').innerText = game.p1.name;
                document.getElementById('p2-n').innerText = game.p2 ? game.p2.name : "...";
                startRound();
            }
            if(game.status === 'end') showEnd();
            if(game.rematch && game.rematch.p1 && game.rematch.p2) {
                const newQ = wordList.sort(() => 0.5 - Math.random()).slice(0, 10);
                update(ref(db, 'rooms/'+roomID), { status:'play', qIdx:0, 'p1/score':0, 'p2/score':0, words:newQ, rematch:{p1:false, p2:false} });
            }
        });
    }

    function startRound() {
        const q = game.words[game.qIdx];
        document.getElementById('p1-s').innerText = game.p1.score;
        document.getElementById('p2-s').innerText = game.p2.score;
        document.getElementById('clue').innerText = q.m;
        const row = document.getElementById('word-row'); row.innerHTML = "";
        q.a.split('').forEach(() => { const b = document.createElement('div'); b.className='box'; row.appendChild(b); });
        
        document.getElementById('hidden-input').value = "";
        document.getElementById('hidden-input').focus();

        let t = 100; clearInterval(timer);
        timer = setInterval(() => {
            t -= 0.8; document.getElementById('timer-bar').style.width = t + "%";
            if(t <= 0) { clearInterval(timer); if(myRole === 'p1') next(); }
        }, 100);
    }

    document.getElementById('hidden-input').oninput = function() {
        const val = this.value.toUpperCase();
        const boxes = document.querySelectorAll('.box');
        const targetWord = game.words[game.qIdx].a;
        boxes.forEach((box, i) => { box.innerText = val[i] || ""; });
        if(val === targetWord) {
            update(ref(db, `rooms/${roomID}/${myRole}`), { score: game[myRole].score + 1 });
            this.value = "";
            next();
        }
    };

    function next() {
        if(game.qIdx < 9) update(ref(db, 'rooms/'+roomID), { qIdx: game.qIdx + 1 });
        else update(ref(db, 'rooms/'+roomID), { status: 'end' });
    }

    function showEnd() {
        clearInterval(timer);
        document.getElementById('end-screen').style.display = 'flex';
        const s1 = game.p1.score; const s2 = game.p2.score;
        const msg = document.getElementById('end-msg');
        if(s1 === s2) msg.innerText = "BERABERE BİTTİ!";
        else if((myRole === 'p1' && s1 > s2) || (myRole === 'p2' && s2 > s1)) msg.innerText = "TEBRİKLER KAZANDINIZ!";
        else msg.innerText = "MAALESEF KAYBETTİNİZ!";
    }

    window.rematch = () => {
        update(ref(db, `rooms/${roomID}/rematch/${myRole}`), true);
        alert("Tekrar oynama isteği gönderildi...");
    };
</script>
</body>
</html>
