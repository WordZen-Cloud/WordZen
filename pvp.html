<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WordZen | Arena</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { background:#000; color:#fff; font-family:'Montserrat', sans-serif; overflow:hidden; }
        
        .wz-panel { display:none; height:100vh; width:100%; flex-direction:column; align-items:center; justify-content:center; position:fixed; top:0; left:0; }
        .active { display:flex !important; }
        .bg-premium { background: radial-gradient(circle at center, #1a1a2e 0%, #000 100%); }

        /* KURMA & BEKLEME */
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); padding: 30px; border-radius: 30px; width: 90%; max-width: 400px; text-align: center; }
        .m-in { width:100%; padding:15px; margin:10px 0; border-radius:15px; background:rgba(0,0,0,0.6); border:1px solid #333; color:#fff; text-align:center; font-weight:800; outline:none; }
        .btn-action { width:100%; padding:18px; border-radius:15px; border:none; font-weight:900; cursor:pointer; margin-top:10px; text-transform:uppercase; transition: 0.3s; }
        
        /* ARENA */
        #arena { display:none; height:100vh; flex-direction:column; background: #050505; }
        #t-bar-cont { width:100%; height:8px; background:rgba(255,255,255,0.1); position:fixed; top:0; }
        #t-bar { width:100%; height:100%; background:linear-gradient(90deg, #39FF14, #00d4ff); transition: width 0.1s linear; box-shadow: 0 0 15px #39FF14; }

        .p-heads { display:flex; justify-content:space-between; padding:40px 20px; width:100%; }
        .p-sc { font-size:3.5rem; font-weight:900; text-shadow: 0 0 20px rgba(57,255,20,0.6); }
        
        #word-row { display:flex; gap:8px; margin:20px 0; justify-content:center; flex-wrap:wrap; }
        .slot { width:45px; height:60px; border:2px solid #333; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:1.8rem; background:rgba(255,255,255,0.03); }
        
        #cl-box { background:rgba(255,255,255,0.05); padding:20px; border-radius:20px; text-align:center; width:85%; border:1px solid #222; font-size:1.1rem; }

        /* SONUÇ EKRANI */
        .result-img { width: 250px; height: auto; margin-bottom: 20px; animation: bounce 1s infinite alternate; }
        @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.1); } }
        .prize-txt { font-size: 2.5rem; color: #ffcc00; margin-bottom: 20px; }
        #k-in { position:absolute; top:-1000px; opacity:0; }
    </style>
</head>
<body onclick="document.getElementById('k-in').focus()">

    <div id="matchmaking-screen" class="wz-panel active bg-premium">
        <div class="glass-card" id="ui-setup">
            <h2 style="color:#00d4ff; margin-bottom:20px;">ARENA</h2>
            <input type="number" id="bet-amount" class="m-in" placeholder="BAHİS">
            <button class="btn-action" style="background:#00d4ff; color:#000;" onclick="createRoom()">ODA KUR</button>
            <div style="margin:15px; color:#444;">Veya</div>
            <input type="number" id="room-code-in" class="m-in" placeholder="ODA KODU">
            <button class="btn-action" style="background:#39FF14; color:#000;" onclick="joinRoom()">KATIL</button>
        </div>

        <div class="glass-card" id="ui-wait" style="display:none;">
            <h1 id="room-code-display" style="color:#ffcc00; font-size:2.5rem; margin-bottom:10px;">WZ-000000</h1>
            <p style="color:#aaa;">Rakip bekleniyor...</p>
            <button class="btn-action" style="background:#ff4b2b; color:#fff;" onclick="location.reload()">İPTAL</button>
        </div>
    </div>

    <div id="arena" class="wz-panel">
        <div id="t-bar-cont"><div id="t-bar"></div></div>
        <div class="p-heads">
            <div style="text-align:center;"><div id="p1-n" style="font-size:0.7rem; color:#aaa;">...</div><div class="p-sc" id="p1-s">0</div></div>
            <div style="font-size:1.2rem; color:#ff4b2b; align-self:center;">VS</div>
            <div style="text-align:center;"><div id="p2-n" style="font-size:0.7rem; color:#aaa;">...</div><div class="p-sc" id="p2-s" style="color:#ff4b2b;">0</div></div>
        </div>
        <div id="word-row"></div>
        <div id="cl-box">...</div>
        <input type="text" id="k-in" autocorrect="off" autocapitalize="none">
    </div>

    <div id="end-screen" class="wz-panel bg-premium">
        <img id="res-img" class="result-img" src="">
        <h1 id="res-msg" class="prize-txt"></h1>
        <button class="btn-action" style="background:#39FF14; color:#000; width:80%;" id="btn-replay" onclick="requestReplay()">TEKRAR OYNA</button>
        <button class="btn-action" style="background:rgba(255,255,255,0.1); color:#fff; width:80%;" onclick="location.href='index.html'">ANA SAYFA</button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCFgWqiyOv1UWfehf8zUtu4XqsXTrRdcZc",
        authDomain: "wordzen-2e052.firebaseapp.com",
        databaseURL: "https://wordzen-2e052-default-rtdb.firebaseio.com",
        projectId: "wordzen-2e052",
        storageBucket: "wordzen-2e052.firebasestorage.app",
        messagingSenderId: "309225718128",
        appId: "1:309225718128:web:8a38717b4b6fc8f3a18fb5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const u = JSON.parse(localStorage.getItem('wz_user'));
    let rID, mRole, gData, timer;

    const words = [
        {a:"ALTIN", m:"Değerli sarı maden."},
        {a:"BATTANİYE", m:"Örtünmek için kullanılan kalın örtü."},
        {a:"TELEFON", m:"Haberleşme cihazı."},
        {a:"KLAVYE", m:"Yazı yazmaya yarayan tuş takımı."}
    ];

    window.createRoom = () => {
        const bet = parseInt(document.getElementById('bet-amount').value) || 10;
        rID = Math.floor(100000 + Math.random() * 900000).toString();
        set(ref(db, 'rooms/' + rID), {
            id: rID, bet: bet, qIdx: 0, status: 'wait',
            p1: { name: u.name, score: 0, replay: false },
            p2: null, words: words.sort(() => Math.random() - 0.5)
        }).then(() => { mRole = 'p1'; showWait(); listen(); });
    };

    window.joinRoom = () => {
        const code = document.getElementById('room-code-in').value;
        onValue(ref(db, 'rooms/' + code), (s) => {
            const d = s.val();
            if(!d || d.p2) return;
            if(confirm(`${d.bet} Coin bahis kabul ediyor musun?`)) {
                update(ref(db, 'rooms/' + code), {
                    p2: { name: u.name, score: 0, replay: false },
                    status: 'play'
                });
                rID = code; mRole = 'p2'; listen();
            }
        }, { onlyOnce: true });
    };

    function showWait() {
        document.getElementById('ui-setup').style.display = 'none';
        document.getElementById('ui-wait').style.display = 'block';
        document.getElementById('room-code-display').innerText = "WZ-" + rID;
    }

    function listen() {
        onValue(ref(db, 'rooms/' + rID), (s) => {
            gData = s.val();
            if(!gData) return;
            if(gData.status === 'play') startArena();
            if(gData.status === 'end') showResults();
            if(gData.p1.replay && gData.p2?.replay) resetGame();
        });
    }

    function startArena() {
        document.getElementById('matchmaking-screen').classList.remove('active');
        document.getElementById('end-screen').classList.remove('active');
        document.getElementById('arena').style.display = 'flex';
        renderRound();
    }

    function renderRound() {
        const q = gData.words[gData.qIdx];
        document.getElementById('p1-n').innerText = gData.p1.name;
        document.getElementById('p2-n').innerText = gData.p2?.name;
        document.getElementById('p1-s').innerText = gData.p1.score;
        document.getElementById('p2-s').innerText = gData.p2?.score;
        document.getElementById('cl-box').innerText = q.m;
        
        const row = document.getElementById('word-row'); row.innerHTML = "";
        q.a.split('').forEach(() => { 
            const b = document.createElement('div'); b.className='slot'; row.appendChild(b); 
        });

        startTimer();
    }

    function startTimer() {
        let t = 100; clearInterval(timer);
        timer = setInterval(() => {
            t -= 0.5; document.getElementById('t-bar').style.width = t + "%";
            if(t <= 0) { clearInterval(timer); if(mRole === 'p1') nextQ(); }
        }, 100);
    }

    document.getElementById('k-in').oninput = function() {
        const q = gData.words[gData.qIdx];
        if(this.value.toUpperCase() === q.a) {
            update(ref(db, `rooms/${rID}/${mRole}`), { score: gData[mRole].score + 1 });
            this.value = "";
            nextQ();
        }
    };

    function nextQ() {
        if(gData.qIdx < gData.words.length - 1) {
            update(ref(db, 'rooms/' + rID), { qIdx: gData.qIdx + 1 });
        } else {
            update(ref(db, 'rooms/' + rID), { status: 'end' });
        }
    }

    function showResults() {
        clearInterval(timer);
        document.getElementById('arena').style.display = 'none';
        document.getElementById('end-screen').classList.add('active');
        
        const win = gData[mRole].score > gData[mRole === 'p1' ? 'p2' : 'p1'].score;
        const sound = new Audio(win ? 'winner.mp3' : 'lose.mp3');
        sound.play();

        document.getElementById('res-img').src = win ? 'winner.jpg' : 'lose.jpg';
        document.getElementById('res-msg').innerText = win ? `KAZANDIN! +${gData.bet*2}` : `KAYBETTİN! -${gData.bet}`;
    }

    window.requestReplay = () => {
        update(ref(db, `rooms/${rID}/${mRole}`), { replay: true });
        document.getElementById('btn-replay').innerText = "BEKLENİYOR...";
    };

    function resetGame() {
        if(mRole === 'p1') {
            update(ref(db, 'rooms/' + rID), {
                status: 'play', qIdx: 0,
                'p1/score': 0, 'p1/replay': false,
                'p2/score': 0, 'p2/replay': false,
                words: words.sort(() => Math.random() - 0.5)
            });
        }
        document.getElementById('btn-replay').innerText = "TEKRAR OYNA";
    }
</script>
</body>
</html>
